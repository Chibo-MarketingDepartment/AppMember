  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"6430a6cd-a1c7-4514-8860-1ca2ea170ab1\"><\u002Fscript>\n<style>html{color-scheme:light}<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n<x-dc>\n\n<helmet data-dc-atomics=\"\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n  <style>\n    body{margin:0;background:#f7f7f5}\n    ::-webkit-scrollbar{width:8px;height:8px}\n    ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:4px}\n    a{color:{{ accentColor }};text-decoration:none}\n    a:hover{color:{{ accentColor }};text-decoration:underline}\n    select{font:inherit}\n  <\u002Fstyle>\n  <script src=\"7ac99ef8-bbf6-4b5d-a3dc-dae93139cf53\"><\u002Fscript>\n  <script src=\"86cb56ef-e973-4ef7-b3e8-f76c54918c19\"><\u002Fscript>\n  <script src=\"3e052fff-8322-46eb-a58a-04e498983458\"><\u002Fscript>\n  <script src=\"25d44efd-a951-4090-b1ed-f50b602a9dbd\"><\u002Fscript>\n<\u002Fhelmet>\n\n<div style=\"font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;color:#1c1c1a;min-height:100vh;background:#f7f7f5;padding-bottom:48px\">\n\n  <sc-if value=\"{{ dataReady }}\" hint-placeholder-val=\"{{ false }}\">\n\n  <!-- Header + Filter bar -->\n  <div data-app-header=\"\" style=\"position:sticky;top:0;z-index:20;background:#ffffff;borderBottom:1px solid rgba(0,0,0,.08);box-shadow:0 1px 0 rgba(0,0,0,.04)\">\n    <div style=\"max-width:1320px;margin:0 auto;padding:16px 20px;display:flex;flex-wrap:wrap;align-items:center;gap:16px 24px\">\n      <div style=\"display:flex;flex-direction:column;gap:2px;margin-right:auto\">\n        <div style=\"font-size:19px;font-weight:700;letter-spacing:.01em\">会員データダッシュボード<\u002Fdiv>\n        <div style=\"font-size:12.5px;color:rgba(0,0,0,.45)\">アプリ会員 月次レポート ・ データ更新: 2026/07/07<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;gap:10px 18px;align-items:center\">\n        <label style=\"display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(0,0,0,.6);flexShrink:0\">\n          対象期間\n          <span style=\"position:relative;display:inline-block;flexShrink:0\">\n            {{ monthSelectEl }}\n            <span style=\"position:absolute;right:10px;top:50%;transform:translateY(-50%);pointerEvents:none;fontSize:10px;color:rgba(0,0,0,.4)\">▾<\u002Fspan>\n          <\u002Fspan>\n        <\u002Flabel>\n        <label style=\"display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(0,0,0,.6);flexShrink:0\">\n          店舗\n          <span style=\"position:relative;display:inline-block;flexShrink:0\">\n            {{ storeSelectEl }}\n            <span style=\"position:absolute;right:10px;top:50%;transform:translateY(-50%);pointerEvents:none;fontSize:10px;color:rgba(0,0,0,.4)\">▾<\u002Fspan>\n          <\u002Fspan>\n        <\u002Flabel>\n        <button onclick=\"{{ onPrintAll }}\" disabled=\"{{ exporting }}\" style=\"padding:8px 14px;border-radius:8px;border:1px solid {{ accentColor }};background:#fff;color:{{ accentColor }};font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;opacity:{{ exportBtnOpacity }}\">{{ exportBtnLabel }}<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- PDF出力 店舗選択モーダル -->\n  <sc-if value=\"{{ exportModalOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ onExportModalClose }}\" style=\"position:fixed;inset:0;background:rgba(0,0,0,.4);zIndex:100;display:flex;alignItems:center;justifyContent:center;padding:20px\">\n      <div onclick=\"{{ stopPropagation }}\" style=\"background:#fff;borderRadius:14px;width:100%;maxWidth:480px;maxHeight:80vh;display:flex;flexDirection:column;overflow:hidden\">\n        <div style=\"padding:18px 20px;borderBottom:1px solid rgba(0,0,0,.08);display:flex;alignItems:center;justifyContent:space-between\">\n          <div style=\"font-size:15px;font-weight:700\">出力する店舗を選択<\u002Fdiv>\n          <button onclick=\"{{ onExportModalClose }}\" style=\"border:none;background:none;fontSize:18px;color:rgba(0,0,0,.4);cursor:pointer;lineHeight:1\">×<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"padding:10px 20px;display:flex;gap:12px;borderBottom:1px solid rgba(0,0,0,.06)\">\n          <button onclick=\"{{ onExportSelectAll }}\" style=\"border:none;background:none;color:{{ accentColor }};fontSize:12.5px;fontWeight:600;cursor:pointer;padding:0\">全選択<\u002Fbutton>\n          <button onclick=\"{{ onExportSelectNone }}\" style=\"border:none;background:none;color:rgba(0,0,0,.45);fontSize:12.5px;fontWeight:600;cursor:pointer;padding:0\">全解除<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"overflow-y:auto;padding:8px 8px\">\n          <sc-for list=\"{{ exportModalStores }}\" as=\"es\" hint-placeholder-count=\"5\">\n            <label style=\"display:flex;alignItems:center;gap:10px;padding:9px 12px;borderRadius:8px;fontSize:13.5px;cursor:pointer\" style-hover=\"background:rgba(0,0,0,.03)\">\n              <input type=\"checkbox\" checked=\"{{ es.checked }}\" onchange=\"{{ es.onToggle }}\" style=\"width:16px;height:16px;flexShrink:0;accentColor:{{ accentColor }}\">\n              <span>{{ es.name }}<\u002Fspan>\n            <\u002Flabel>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"padding:14px 20px;borderTop:1px solid rgba(0,0,0,.08);display:flex;gap:10px;justifyContent:flex-end\">\n          <button onclick=\"{{ onExportModalClose }}\" style=\"padding:9px 16px;borderRadius:8px;border:1px solid rgba(0,0,0,.15);background:#fff;color:#1c1c1a;fontSize:13px;fontWeight:600;cursor:pointer\">キャンセル<\u002Fbutton>\n          <button onclick=\"{{ onExportConfirm }}\" disabled=\"{{ exportConfirmDisabled }}\" style=\"padding:9px 16px;borderRadius:8px;border:none;background:{{ accentColor }};color:#fff;fontSize:13px;fontWeight:700;cursor:pointer;opacity:{{ exportConfirmOpacity }}\">{{ exportConfirmLabel }}<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <div data-app-main=\"\" style=\"max-width:1320px;margin:0 auto;padding:24px 20px 0\">\n\n    <!-- KPI cards -->\n    <div style=\"display:grid;gridTemplateColumns:repeat(auto-fit, minmax(240px, 1fr));gap:16px;margin-bottom:20px\">\n\n      <!-- 新規会員登録数 -->\n      <div style=\"background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:14px;padding:18px 20px;display:flex;flex-direction:column;gap:10px\">\n        <div style=\"font-size:12.5px;color:rgba(0,0,0,.5);font-weight:600\">新規会員登録数（{{ selMonthLabel }}）<\u002Fdiv>\n        <div style=\"display:flex;align-items:baseline;gap:8px\">\n          <div style=\"font-size:30px;font-weight:800;letter-spacing:-.01em\">{{ kpi.newRegFmt }}<\u002Fdiv>\n          <div style=\"font-size:12.5px;color:rgba(0,0,0,.4)\">人<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"height:56px\">\n          <canvas ref=\"{{ trendChartRef }}\"><\u002Fcanvas>\n        <\u002Fdiv>\n        <div style=\"font-size:11.5px;color:rgba(0,0,0,.4)\">直近12カ月推移<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 総会員数 -->\n      <div style=\"background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:14px;padding:18px 20px;display:flex;flex-direction:column;gap:8px\">\n        <div style=\"font-size:12.5px;color:rgba(0,0,0,.5);font-weight:600\">総会員数（累計・{{ selMonthLabel }}時点）<\u002Fdiv>\n        <div style=\"display:flex;align-items:baseline;gap:8px\">\n          <div style=\"font-size:30px;font-weight:800;letter-spacing:-.01em\">{{ kpi.totalMembersFmt }}<\u002Fdiv>\n          <div style=\"font-size:12.5px;color:rgba(0,0,0,.4)\">人<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:{{ kpi.totalMembersDeltaColor }}\">\n          <span>{{ kpi.totalMembersDeltaArrow }}<\u002Fspan><span>{{ kpi.totalMembersDeltaFmt }}<\u002Fspan>\n          <span style=\"font-weight:400;color:rgba(0,0,0,.4)\">先月比<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"margin-top:4px;padding-top:10px;borderTop:1px dashed rgba(0,0,0,.1);font-size:12.5px;color:rgba(0,0,0,.55)\">\n          対客数比（当月）　<b style=\"color:#1c1c1a;font-size:14px\">{{ kpi.memberRatioFmt }}<\u002Fb>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- アクティブ会員数 -->\n      <div style=\"background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:14px;padding:18px 20px;display:flex;flex-direction:column;gap:8px\">\n        <div style=\"font-size:12.5px;color:rgba(0,0,0,.5);font-weight:600\">アクティブ会員数（直近3カ月起動）<\u002Fdiv>\n        <div style=\"display:flex;align-items:baseline;gap:8px\">\n          <div style=\"font-size:30px;font-weight:800;letter-spacing:-.01em\">{{ kpi.activeFmt }}<\u002Fdiv>\n          <div style=\"font-size:12.5px;color:rgba(0,0,0,.4)\">人<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:{{ kpi.activeDeltaColor }}\">\n          <span>{{ kpi.activeDeltaArrow }}<\u002Fspan><span>{{ kpi.activeDeltaFmt }}<\u002Fspan>\n          <span style=\"font-weight:400;color:rgba(0,0,0,.4)\">先月比<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"margin-top:4px;padding-top:10px;borderTop:1px dashed rgba(0,0,0,.1);font-size:12.5px;color:rgba(0,0,0,.55)\">\n          対客数比（当月）　<b style=\"color:#1c1c1a;font-size:14px\">{{ kpi.activeRatioFmt }}<\u002Fb>　・　会員比 <b style=\"color:#1c1c1a;font-size:14px\">{{ kpi.activeOfMemberFmt }}<\u002Fb>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 当月来店会員数 -->\n      <div style=\"background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:14px;padding:18px 20px;display:flex;flex-direction:column;gap:8px\">\n        <div style=\"font-size:12.5px;color:rgba(0,0,0,.5);font-weight:600\">当月来店会員数（{{ selMonthLabel }}）<\u002Fdiv>\n        <div style=\"display:flex;align-items:baseline;gap:8px\">\n          <div style=\"font-size:30px;font-weight:800;letter-spacing:-.01em\">{{ kpi.visitorsFmt }}<\u002Fdiv>\n          <div style=\"font-size:12.5px;color:rgba(0,0,0,.4)\">人<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:{{ kpi.visitorsDeltaColor }}\">\n          <span>{{ kpi.visitorsDeltaArrow }}<\u002Fspan><span>{{ kpi.visitorsDeltaFmt }}<\u002Fspan>\n          <span style=\"font-weight:400;color:rgba(0,0,0,.4)\">先月比<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"margin-top:4px;padding-top:10px;borderTop:1px dashed rgba(0,0,0,.1);font-size:12.5px;color:rgba(0,0,0,.55)\">\n          対客数比（当月）　<b style=\"color:#1c1c1a;font-size:14px\">{{ kpi.visitorsRatioFmt }}<\u002Fb>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ランク分布 + 性別年代 + 居住地 -->\n    <div style=\"display:grid;gridTemplateColumns:repeat(auto-fit, minmax(320px, 1fr));gap:16px;margin-bottom:20px\">\n\n      <!-- ランク分布 -->\n      <div style=\"background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:14px;padding:20px\">\n        <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px\">\n          <div style=\"font-size:14px;font-weight:700\">ランク分布（直近12カ月の来店回数）<\u002Fdiv>\n          <div style=\"font-size:11.5px;color:rgba(0,0,0,.4)\">0回=ブロンズ / 1〜3=シルバー / 4〜6=ゴールド / 7回以上=プラチナ<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:20px;align-items:center\">\n          <div style=\"width:150px;height:150px;flex:none\"><canvas ref=\"{{ rankChartRef }}\"><\u002Fcanvas><\u002Fdiv>\n          <div style=\"flex:1;display:flex;flex-direction:column;gap:8px\">\n            <sc-for list=\"{{ rankRows }}\" as=\"r\" hint-placeholder-count=\"4\">\n              <div onclick=\"{{ r.onClick }}\" style=\"display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;padding:6px 8px;border-radius:8px;background:{{ r.rowBg }};border:1px solid {{ r.rowBorder }}\">\n                <div style=\"width:10px;height:10px;border-radius:3px;background:{{ r.color }};flex:none\"><\u002Fdiv>\n                <div style=\"width:64px;color:rgba(0,0,0,.6)\">{{ r.label }}<\u002Fdiv>\n                <div style=\"width:56px;font-weight:700\">{{ r.countFmt }}人<\u002Fdiv>\n                <div style=\"width:48px;color:rgba(0,0,0,.4)\">{{ r.pctFmt }}<\u002Fdiv>\n                <div style=\"font-size:11.5px;font-weight:700;color:{{ r.deltaColor }}\">{{ r.deltaArrow }}{{ r.deltaFmt }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <sc-if value=\"{{ rankFilterActive }}\" hint-placeholder-val=\"{{ false }}\">\n              <div onclick=\"{{ onClearRankFilter }}\" style=\"cursor:pointer;font-size:12px;color:{{ accentColor }};font-weight:700;padding:4px 8px\">✕ 絞り込み解除<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 性別＆年代 -->\n      <div style=\"background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:14px;padding:20px\">\n        <div style=\"display:flex;flex-direction:column;gap:4px;margin-bottom:12px\">\n          <div style=\"font-size:14px;font-weight:700\">性別 ／ 年代 人口動態（累計会員）<\u002Fdiv>\n          <sc-if value=\"{{ rankFilterActive }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"margin-top:4px;font-size:11.5px;font-weight:700;color:{{ accentColor }};background:rgba(31,138,91,.1);padding:2px 8px;border-radius:6px;display:inline-block;width:fit-content\">{{ rankFilterLabel }}<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:20px;align-items:center;margin-bottom:14px\">\n          <div style=\"width:100px;height:100px;flex:none\"><canvas ref=\"{{ genderChartRef }}\"><\u002Fcanvas><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:6px;font-size:13px\">\n            <div style=\"display:flex;align-items:center;gap:8px\"><div style=\"width:10px;height:10px;border-radius:3px;background:{{ accentColor }}\"><\u002Fdiv>男性 {{ demo.maleFmt }}（{{ demo.malePctFmt }}）<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px\"><div style=\"width:10px;height:10px;border-radius:3px;background:#e08a9a\"><\u002Fdiv>女性 {{ demo.femaleFmt }}（{{ demo.femalePctFmt }}）<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px\"><div style=\"width:10px;height:10px;border-radius:3px;background:#d8d5cd\"><\u002Fdiv>不明 {{ demo.unknownFmt }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"height:150px\"><canvas ref=\"{{ ageChartRef }}\"><\u002Fcanvas><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 居住地分布 -->\n      <div style=\"background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:14px;padding:20px\">\n        <div style=\"display:flex;flex-direction:column;gap:4px;margin-bottom:12px\">\n          <div style=\"font-size:14px;font-weight:700\">居住地分布（{{ prefOrCityLabel }}・上位10）<\u002Fdiv>\n          <div style=\"font-size:11px;color:rgba(0,0,0,.35)\">郵便番号から住所を近似<\u002Fdiv>\n          <sc-if value=\"{{ rankFilterActive }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"margin-top:4px;font-size:11.5px;font-weight:700;color:{{ accentColor }};background:rgba(31,138,91,.1);padding:2px 8px;border-radius:6px;display:inline-block;width:fit-content\">{{ rankFilterLabel }}<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"height:260px\"><canvas ref=\"{{ prefChartRef }}\"><\u002Fcanvas><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- クーポン -->\n    <div style=\"display:grid;gridTemplateColumns:minmax(320px,1.3fr) minmax(280px,1fr);gap:16px;margin-bottom:20px\">\n      <div style=\"background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:14px;padding:20px\">\n        <div style=\"font-size:14px;font-weight:700;margin-bottom:4px\">クーポン回収 店舗別ランキング（{{ selMonthLabel }}）<\u002Fdiv>\n        <div style=\"font-size:11.5px;color:rgba(0,0,0,.4);margin-bottom:12px\">利用件数の構成比 ・ 全アプリ導入店舗中<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:2px;max-height:360px;overflow:auto\">\n          <div style=\"display:flex;font-size:11.5px;color:rgba(0,0,0,.4);padding:4px 8px;position:sticky;top:0;background:#fff\">\n            <div style=\"width:32px\">順位<\u002Fdiv><div style=\"flex:1\">店舗名<\u002Fdiv><div style=\"width:70px;text-align:right\">利用数<\u002Fdiv><div style=\"width:70px;text-align:right\">構成比<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-for list=\"{{ couponRanking }}\" as=\"c\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex;align-items:center;padding:8px;border-radius:8px;font-size:13px;background:{{ c.rowBg }}\">\n              <div style=\"width:32px;color:rgba(0,0,0,.4)\">{{ c.rank }}<\u002Fdiv>\n              <div style=\"flex:1;font-weight:{{ c.weight }};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px\">{{ c.name }}<\u002Fdiv>\n              <div style=\"width:70px;text-align:right;font-weight:700\">{{ c.countFmt }}<\u002Fdiv>\n              <div style=\"width:70px;text-align:right;color:rgba(0,0,0,.5)\">{{ c.pctFmt }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:16px\">\n        <div>\n          <div style=\"font-size:14px;font-weight:700;margin-bottom:8px\">曜日別クーポン利用（{{ selStoreLabel }}）<\u002Fdiv>\n          <div style=\"height:120px\"><canvas ref=\"{{ dowChartRef }}\"><\u002Fcanvas><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border-top:1px solid rgba(0,0,0,.06);padding-top:14px\">\n          <div style=\"font-size:14px;font-weight:700;margin-bottom:8px\">利用クーポン内訳（{{ selStoreLabel }}）<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:6px;max-height:150px;overflow:auto\">\n            <sc-for list=\"{{ couponNameRows }}\" as=\"n\" hint-placeholder-count=\"5\">\n              <div style=\"display:flex;align-items:center;gap:8px;font-size:12.5px\">\n                <div style=\"flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:rgba(0,0,0,.65)\">{{ n.name }}<\u002Fdiv>\n                <div style=\"font-weight:700\">{{ n.countFmt }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <sc-if value=\"{{ couponNameEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"font-size:12.5px;color:rgba(0,0,0,.35);padding:8px 0\">この期間・店舗の利用データはありません<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 月次来店会員数の推移 -->\n    <sc-if value=\"{{ showSalesReference }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:14px;padding:20px;margin-bottom:20px\">\n      <div style=\"display:flex;flex-direction:column;gap:2px;margin-bottom:8px\">\n        <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:12px\">\n          <div style=\"font-size:14px;font-weight:700\">月次来店会員数の推移（対客数比）<\u002Fdiv>\n          <div style=\"font-size:11px;color:rgba(0,0,0,.4);white-space:nowrap;flex:none\">直近12カ月<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:12px;color:rgba(0,0,0,.45)\">{{ selStoreLabel }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:11.5px;color:rgba(0,0,0,.4);margin-bottom:12px\">来店スタンプを利用した会員数と、店舗全体の客数実績（POS）に対する比率を比較しています<\u002Fdiv>\n      <div style=\"height:220px\"><canvas ref=\"{{ visitorsChartRef }}\"><\u002Fcanvas><\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- Methodology footer -->\n    <details style=\"background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:14px;padding:16px 20px;margin-bottom:32px;font-size:12.5px;color:rgba(0,0,0,.55);line-height:1.8\">\n      <summary style=\"cursor:pointer;font-weight:700;color:#1c1c1a\">データ・集計方法について<\u002Fsummary>\n      <div style=\"margin-top:8px\">\n        ・集計対象は「会員登録状況」「来店スタンプ」「クーポン利用」「月別売上実績」の提供データ（2025/04〜2026/06、対象月フィルタ）。<br>\n        ・店舗は「店舗マスタ（shop_data）」記載の27アプリ実施店舗のみを対象。会員データとは店舗IDで突合。ヨドバシHD池袋ビル支店→リンクス池袋支店、堺高島屋支店→堺東支店は店舗IDが同一のため自動的に統合されています。<br>\n        ・総会員数は各店舗の累計登録者数（登録月が対象月以前の会員）。アクティブ会員数は会員登録状況の「最終起動日」が対象月を含む直近3カ月以内である会員数（アプリを起動した会員数）。<br>\n        ・「対客数比」の分母は当月の店舗売上データの客数実績。総会員数は累計、来店会員数・アクティブ会員数は単月/直近3カ月の値のため、性質の異なる指標の比較値（あくまで参考）です。<br>\n        ・当月来店会員数は、当月中に来店スタンプを1回以上利用した会員の実人数（同一会員の複数回来店は1人としてカウント）。<br>\n        ・ランク分布は対象月を含む直近12カ月の来店回数（0回=ブロンズ、1〜3回=シルバー、4〜6回=ゴールド、7回以上=プラチナ）。<br>\n        ・居住地分布は日本郵便の郵便番号データ（KEN_ALL）による住所近似。全店選択時は都道府県、個店選択時は市区町村で表示（郵便番号が対応表にない場合は「不明」）。<br>\n\n        ・クーポン集計は「会員登録_インセンティブ」系クーポン（新規登録特典）を除いて集計しています。\n      <\u002Fdiv>\n    <\u002Fdetails>\n  <\u002Fdiv>\n\n  <\u002Fsc-if>\n  <sc-if value=\"{{ dataNotReady }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"display:flex;align-items:center;justify-content:center;height:60vh;color:rgba(0,0,0,.4);font-size:14px\">データを読み込み中...<\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- PPTX スライド出力用ルート（1920x1080） -->\n  <div data-pptx-slide-root=\"\" style=\"position:fixed;top:0;left:0;width:1920px;height:1080px;background:#ffffff;boxSizing:border-box;display:{{ pptxDisplay }};flexDirection:column;padding:70px 90px;fontFamily:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;color:#1c1c1a;zIndex:99999;overflow:hidden\">\n\n    <!-- タイトルスライド -->\n    <sc-if value=\"{{ pptxSlide.isTitle }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"flex:1;display:flex;flexDirection:column;justifyContent:center;alignItems:flex-start;gap:24px\">\n        <div style=\"width:56px;height:8px;background:{{ accentColor }};borderRadius:4px\"><\u002Fdiv>\n        <div style=\"font-size:56px;font-weight:800;letter-spacing:-.01em\">{{ pptxSlide.title }}<\u002Fdiv>\n        <div style=\"font-size:26px;color:rgba(0,0,0,.55)\">{{ pptxSlide.subtitle }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- 通常スライド共通ヘッダー -->\n    <sc-if value=\"{{ pptxHeaderVisible }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:flex;flexDirection:column;gap:6px;marginBottom:36px;borderBottom:3px solid #1c1c1a;paddingBottom:18px\">\n        <div style=\"font-size:{{ pptxTitleSize }}px;font-weight:800\">{{ pptxSlide.title }}<\u002Fdiv>\n        <div style=\"font-size:20px;color:rgba(0,0,0,.5)\">{{ pptxSlide.subtitle }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- KPIカード -->\n    <sc-if value=\"{{ pptxSlide.showKpiSection }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:grid;gridTemplateColumns:repeat(4,1fr);gap:24px;marginBottom:{{ pptxSectionGap }}px\">\n        <sc-for list=\"{{ pptxSlide.kpiCards }}\" as=\"kc\" hint-placeholder-count=\"4\">\n          <div style=\"border:1px solid rgba(0,0,0,.15);borderRadius:14px;padding:24px 26px\">\n            <div style=\"font-size:18px;color:rgba(0,0,0,.5);marginBottom:10px\">{{ kc.label }}<\u002Fdiv>\n            <div style=\"fontSize:40px;fontWeight:800\">{{ kc.value }}<span style=\"font-size:18px;font-weight:400\">{{ kc.unit }}<\u002Fspan><\u002Fdiv>\n            <div style=\"font-size:16px;font-weight:700;color:{{ kc.deltaColor }};marginTop:8px\">{{ kc.deltaArrow }} {{ kc.deltaFmt }} <span style=\"font-weight:400;color:rgba(0,0,0,.4)\">先月比<\u002Fspan><\u002Fdiv>\n            <sc-if value=\"{{ kc.sub }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"font-size:15px;color:rgba(0,0,0,.45);marginTop:4px\">{{ kc.sub }}<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- 中段: ランク / 性別年代 / 居住地 / クーポン を横並びで配置（store/overview共通） -->\n    <div style=\"display:flex;gap:28px;flex:1;minHeight:0\">\n\n      <sc-if value=\"{{ pptxSlide.showRankSection }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"flex:1;border:1px solid rgba(0,0,0,.15);borderRadius:14px;padding:24px 26px;display:flex;flexDirection:column;gap:14px;minWidth:0\">\n          <div style=\"font-size:20px;font-weight:700\">ランク分布（直近12カ月来店回数）<\u002Fdiv>\n          <sc-for list=\"{{ pptxSlide.rankRows }}\" as=\"r\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex;flexDirection:column;gap:6px\">\n              <div style=\"display:flex;alignItems:center;justifyContent:space-between;font-size:17px\">\n                <div style=\"display:flex;alignItems:center;gap:8px\"><div style=\"width:12px;height:12px;borderRadius:3px;background:{{ r.color }}\"><\u002Fdiv>{{ r.label }}<\u002Fdiv>\n                <div style=\"display:flex;alignItems:baseline;gap:8px\">\n                  <b>{{ r.countFmt }}人<\u002Fb><span style=\"color:rgba(0,0,0,.45)\">（{{ r.pctFmt }}）<\u002Fspan>\n                  <span style=\"fontSize:14px;fontWeight:700;color:{{ r.deltaColor }}\">{{ r.deltaArrow }}{{ r.deltaFmt }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"background:rgba(0,0,0,.06);borderRadius:5px;height:12px;overflow:hidden\">\n                <div style=\"width:{{ r.barPct }}%;height:100%;background:{{ r.color }}\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ pptxSlide.showDemoSection }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"flex:1;border:1px solid rgba(0,0,0,.15);borderRadius:14px;padding:24px 26px;display:flex;flexDirection:column;gap:14px;minWidth:0\">\n          <div style=\"font-size:20px;font-weight:700\">性別・年代<\u002Fdiv>\n          <div style=\"display:flex;gap:16px;font-size:16px;marginBottom:4px\">\n            <sc-for list=\"{{ pptxSlide.genderRows }}\" as=\"g\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex;alignItems:center;gap:6px\"><div style=\"width:10px;height:10px;borderRadius:3px;background:{{ g.color }}\"><\u002Fdiv>{{ g.label }} {{ g.countFmt }}（{{ g.pctFmt }}）<\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <sc-for list=\"{{ pptxSlide.ageRows }}\" as=\"a\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex;alignItems:center;gap:10px;font-size:15px\">\n              <div style=\"width:52px;color:rgba(0,0,0,.6)\">{{ a.label }}<\u002Fdiv>\n              <div style=\"flex:1;background:rgba(0,0,0,.06);borderRadius:5px;height:11px;overflow:hidden\">\n                <div style=\"width:{{ a.barPct }}%;height:100%;background:{{ accentColor }}\"><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"width:56px;textAlign:right;fontWeight:700\">{{ a.countFmt }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ pptxSlide.showGeoSection }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"flex:1;border:1px solid rgba(0,0,0,.15);borderRadius:14px;padding:24px 26px;display:flex;flexDirection:column;gap:12px;minWidth:0\">\n          <div style=\"font-size:20px;font-weight:700\">居住地分布（{{ pptxSlide.geoLabel }}）<\u002Fdiv>\n          <sc-for list=\"{{ pptxSlide.geoRows }}\" as=\"g2\" hint-placeholder-count=\"8\">\n            <div style=\"display:flex;alignItems:center;gap:10px;font-size:15px\">\n              <div style=\"width:110px;color:rgba(0,0,0,.65);overflow:hidden;textOverflow:ellipsis;whiteSpace:nowrap\">{{ g2.name }}<\u002Fdiv>\n              <div style=\"flex:1;background:rgba(0,0,0,.06);borderRadius:5px;height:11px;overflow:hidden\">\n                <div style=\"width:{{ g2.barPct }}%;height:100%;background:{{ accentColor }}\"><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"width:70px;textAlign:right;fontWeight:700\">{{ g2.countFmt }}<\u002Fdiv>\n              <div style=\"width:56px;textAlign:right;color:rgba(0,0,0,.45)\">{{ g2.pctFmt }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ pptxSlide.isStore }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"flex:1;border:1px solid rgba(0,0,0,.15);borderRadius:14px;padding:24px 26px;display:flex;flexDirection:column;gap:10px;minWidth:0\">\n          <div style=\"font-size:20px;font-weight:700\">クーポン利用（当月合計{{ pptxSlide.couponTotalFmt }}件）<\u002Fdiv>\n          <sc-for list=\"{{ pptxSlide.couponRows }}\" as=\"c\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex;alignItems:center;gap:10px;font-size:15px\">\n              <div style=\"flex:1;color:rgba(0,0,0,.65);overflow:hidden;textOverflow:ellipsis;whiteSpace:nowrap\">{{ c.name }}<\u002Fdiv>\n              <div style=\"width:60px;textAlign:right;fontWeight:700\">{{ c.countFmt }}<\u002Fdiv>\n              <div style=\"width:56px;textAlign:right;color:rgba(0,0,0,.45)\">{{ c.pctFmt }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n\n    <!-- トレンド専用スライド -->\n    <sc-if value=\"{{ pptxSlide.isTrend }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"display:flex;gap:32px;flex:1;minHeight:0\">\n        <div style=\"flex:1;border:1px solid rgba(0,0,0,.15);borderRadius:14px;padding:28px 30px;display:flex;flexDirection:column;gap:14px;minWidth:0\">\n          <div style=\"font-size:20px;font-weight:700\">新規会員登録数（直近12カ月）<\u002Fdiv>\n          <div style=\"flex:1;position:relative\"><canvas ref=\"{{ pptxNewRegChartRef }}\"><\u002Fcanvas><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1;border:1px solid rgba(0,0,0,.15);borderRadius:14px;padding:28px 30px;display:flex;flexDirection:column;gap:14px;minWidth:0\">\n          <div style=\"font-size:20px;font-weight:700\">来店会員数と客数対比率（直近12カ月）<\u002Fdiv>\n          <div style=\"flex:1;position:relative\"><canvas ref=\"{{ pptxVisitorsChartRef }}\"><\u002Fcanvas><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- クーポン店舗ランキング（全店概要） -->\n    <sc-if value=\"{{ pptxSlide.isCouponOverview }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"border:1px solid rgba(0,0,0,.15);borderRadius:14px;padding:30px 34px;flex:1;display:flex;flexDirection:column;gap:12px;overflow:hidden\">\n        <div style=\"font-size:20px;font-weight:700\">店舗別クーポン利用ランキング（当月合計{{ pptxSlide.couponTotalFmt }}件）<\u002Fdiv>\n        <sc-for list=\"{{ pptxSlide.couponStoreRows }}\" as=\"cr\" hint-placeholder-count=\"10\">\n          <div style=\"display:flex;alignItems:center;gap:16px;font-size:17px\">\n            <div style=\"width:32px;color:rgba(0,0,0,.4);fontWeight:700\">{{ cr.rank }}<\u002Fdiv>\n            <div style=\"width:340px;overflow:hidden;textOverflow:ellipsis;whiteSpace:nowrap\">{{ cr.name }}<\u002Fdiv>\n            <div style=\"flex:1;background:rgba(0,0,0,.06);borderRadius:5px;height:14px;overflow:hidden\">\n              <div style=\"width:{{ cr.barPct }}%;height:100%;background:{{ accentColor }}\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"width:90px;textAlign:right;fontWeight:700\">{{ cr.countFmt }}<\u002Fdiv>\n            <div style=\"width:70px;textAlign:right;color:rgba(0,0,0,.45)\">{{ cr.pctFmt }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div style=\"position:absolute;bottom:28px;right:40px;font-size:14px;color:rgba(0,0,0,.3)\">{{ pptxFooterLabel }}<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"position:fixed;left:-99999px;top:0;background:#fff;pointerEvents:none\" ref=\"{{ exportContainerRef }}\">\n      <sc-for list=\"{{ printPages }}\" as=\"pg\" hint-placeholder-count=\"0\">\n        <div style=\"width:210mm;minHeight:297mm;padding:14mm 16mm;boxSizing:border-box;fontFamily:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;color:#1c1c1a\">\n          <div style=\"display:flex;align-items:baseline;justify-content:space-between;borderBottom:2px solid #1c1c1a;paddingBottom:10px;marginBottom:16px\">\n            <div style=\"font-size:20px;font-weight:800\">{{ pg.storeName }}　会員データレポート<\u002Fdiv>\n            <div style=\"font-size:12px;color:rgba(0,0,0,.5)\">対象月：{{ pg.monthLabel }}　｜　出力日：{{ pg.generatedDate }}<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:grid;gridTemplateColumns:repeat(4,1fr);gap:10px;margin-bottom:16px\">\n            <div style=\"border:1px solid rgba(0,0,0,.15);borderRadius:8px;padding:10px 12px\">\n              <div style=\"font-size:10.5px;color:rgba(0,0,0,.5)\">新規会員登録数<\u002Fdiv>\n              <div style=\"font-size:20px;font-weight:800\">{{ pg.newRegFmt }}<span style=\"font-size:11px;font-weight:400\">人<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:10.5px;font-weight:700;color:{{ pg.newRegDeltaColor }};margin-top:2px\">{{ pg.newRegDeltaArrow }}{{ pg.newRegDeltaFmt }} <span style=\"font-weight:400;color:rgba(0,0,0,.4)\">前月比<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"border:1px solid rgba(0,0,0,.15);borderRadius:8px;padding:10px 12px\">\n              <div style=\"font-size:10.5px;color:rgba(0,0,0,.5)\">総会員数（累計）<\u002Fdiv>\n              <div style=\"font-size:20px;font-weight:800\">{{ pg.totalFmt }}<span style=\"font-size:11px;font-weight:400\">人<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:10.5px;font-weight:700;color:{{ pg.totalDeltaColor }};margin-top:2px\">{{ pg.totalDeltaArrow }}{{ pg.totalDeltaFmt }} <span style=\"font-weight:400;color:rgba(0,0,0,.4)\">前月比<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"border:1px solid rgba(0,0,0,.15);borderRadius:8px;padding:10px 12px\">\n              <div style=\"font-size:10.5px;color:rgba(0,0,0,.5)\">アクティブ会員数<\u002Fdiv>\n              <div style=\"font-size:20px;font-weight:800\">{{ pg.activeFmt }}<span style=\"font-size:11px;font-weight:400\">人<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:10.5px;font-weight:700;color:{{ pg.activeDeltaColor }};margin-top:2px\">{{ pg.activeDeltaArrow }}{{ pg.activeDeltaFmt }} <span style=\"font-weight:400;color:rgba(0,0,0,.4)\">前月比<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"border:1px solid rgba(0,0,0,.15);borderRadius:8px;padding:10px 12px\">\n              <div style=\"font-size:10.5px;color:rgba(0,0,0,.5)\">当月来店会員数<\u002Fdiv>\n              <div style=\"font-size:20px;font-weight:800\">{{ pg.salesFmt }}<span style=\"font-size:11px;font-weight:400\">人<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:10.5px;font-weight:700;color:{{ pg.visitorsDeltaColor }};margin-top:2px\">{{ pg.visitorsDeltaArrow }}{{ pg.visitorsDeltaFmt }} <span style=\"font-weight:400;color:rgba(0,0,0,.4)\">前月比<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:10.5px;color:rgba(0,0,0,.5);margin-top:1px\">対客数比 <b style=\"color:#1c1c1a\">{{ pg.visitorsRatioFmt }}<\u002Fb><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:grid;gridTemplateColumns:1fr 1fr;gap:14px\">\n            <div style=\"border:1px solid rgba(0,0,0,.15);borderRadius:8px;padding:12px 14px\">\n              <div style=\"font-size:12.5px;font-weight:700;margin-bottom:8px\">ランク分布（直近12カ月来店回数）<\u002Fdiv>\n              <sc-for list=\"{{ pg.rankRows }}\" as=\"r\" hint-placeholder-count=\"4\">\n                <div style=\"display:flex;align-items:center;gap:8px;font-size:11.5px;margin-bottom:5px\">\n                  <div style=\"width:8px;height:8px;borderRadius:2px;background:{{ r.color }};flex:none\"><\u002Fdiv>\n                  <div style=\"width:56px;color:rgba(0,0,0,.6)\">{{ r.label }}<\u002Fdiv>\n                  <div style=\"flex:1;background:rgba(0,0,0,.06);borderRadius:4px;height:8px;overflow:hidden\">\n                    <div style=\"width:{{ r.barPct }}%;height:100%;background:{{ r.color }}\"><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"width:56px;text-align:right;font-weight:700\">{{ r.countFmt }}人<\u002Fdiv>\n                  <div style=\"width:56px;text-align:right;font-size:10.5px;font-weight:700;color:{{ r.deltaColor }}\">{{ r.deltaArrow }}{{ r.deltaFmt }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"border:1px solid rgba(0,0,0,.15);borderRadius:8px;padding:12px 14px\">\n              <div style=\"font-size:12.5px;font-weight:700;margin-bottom:8px\">性別・年代<\u002Fdiv>\n              <div style=\"font-size:11.5px;margin-bottom:8px\">男性 {{ pg.maleFmt }}人（{{ pg.malePctFmt }}）　・　女性 {{ pg.femaleFmt }}人（{{ pg.femalePctFmt }}）　・　不明 {{ pg.unknownGenderFmt }}人（{{ pg.unknownGenderPctFmt }}）<\u002Fdiv>\n              <sc-for list=\"{{ pg.ageRows }}\" as=\"a\" hint-placeholder-count=\"6\">\n                <div style=\"display:flex;align-items:center;gap:8px;font-size:11px;margin-bottom:4px\">\n                  <div style=\"width:36px;color:rgba(0,0,0,.6)\">{{ a.label }}<\u002Fdiv>\n                  <div style=\"flex:1;background:rgba(0,0,0,.06);borderRadius:4px;height:7px;overflow:hidden\">\n                    <div style=\"width:{{ a.barPct }}%;height:100%;background:{{ accentColor }}\"><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"width:44px;text-align:right;font-weight:700\">{{ a.countFmt }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"border:1px solid rgba(0,0,0,.15);borderRadius:8px;padding:12px 14px\">\n              <div style=\"font-size:12.5px;font-weight:700;margin-bottom:8px\">居住地分布（上位5）<\u002Fdiv>\n              <sc-for list=\"{{ pg.geoRows }}\" as=\"g\" hint-placeholder-count=\"5\">\n                <div style=\"display:flex;align-items:center;gap:8px;font-size:11.5px;margin-bottom:5px\">\n                  <div style=\"flex:1;color:rgba(0,0,0,.65)\">{{ g.name }}<\u002Fdiv>\n                  <div style=\"font-weight:700\">{{ g.countFmt }}人<\u002Fdiv>\n                  <div style=\"width:44px;text-align:right;color:rgba(0,0,0,.4)\">{{ g.pctFmt }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"border:1px solid rgba(0,0,0,.15);borderRadius:8px;padding:12px 14px\">\n              <div style=\"font-size:12.5px;font-weight:700;margin-bottom:8px\">クーポン利用（上位5・合計{{ pg.couponTotalFmt }}件）<\u002Fdiv>\n              <sc-for list=\"{{ pg.couponRows }}\" as=\"c\" hint-placeholder-count=\"5\">\n                <div style=\"display:flex;align-items:center;gap:8px;font-size:11.5px;margin-bottom:5px\">\n                  <div style=\"flex:1;color:rgba(0,0,0,.65);overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ c.name }}<\u002Fdiv>\n                  <div style=\"font-weight:700\">{{ c.countFmt }}<\u002Fdiv>\n                  <div style=\"width:44px;text-align:right;color:rgba(0,0,0,.4)\">{{ c.pctFmt }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n              <sc-if value=\"{{ pg.couponEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"font-size:11px;color:rgba(0,0,0,.35)\">利用データなし<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:14px;font-size:9.5px;color:rgba(0,0,0,.4)\">\n            アクティブ会員＝直近3カ月以内にアプリを起動した会員。ランクは直近12カ月の来店回数（0回=ブロンズ／1〜3回=シルバー／4〜6回=ゴールド／7回以上=プラチナ）。居住地は郵便番号からの近似。クーポンは会員登録インセンティブを除く。\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1400,&quot;height&quot;:1600},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#1F8A5B&quot;,&quot;options&quot;:[&quot;#1F8A5B&quot;,&quot;#2A6FDB&quot;,&quot;#D97757&quot;,&quot;#7C5CBF&quot;,&quot;#0F172A&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;showSalesReference&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\n\nconst RANK_COLORS = { bronze:'#b08d57', silver:'#9aa0a6', gold:'#d4a72c', platinum:'#5b6b8c' };\nconst RANK_LABELS = { bronze:'ブロンズ', silver:'シルバー', gold:'ゴールド', platinum:'プラチナ' };\nconst DOW_LABELS = ['日','月','火','水','木','金','土'];\n\nfunction fmtInt(n){ return (n==null || isNaN(n)) ? '−' : Math.round(n).toLocaleString('ja-JP'); }\nfunction fmtPct(n, digits){ return (n==null || isNaN(n)) ? '−' : n.toFixed(digits==null?1:digits) + '%'; }\nfunction fmtYen(n){ return (n==null || isNaN(n)) ? '−' : Math.round(n).toLocaleString('ja-JP'); }\n\nclass Component extends DCLogic {\n  state = { month: null, store: '__ALL__', selectedRank: null, exporting: false, exportIndex: -1, exportTotal: 0, exportModalOpen: false, exportChecked: null, pptxIndex: -1 };\n\n  constructor(props){\n    super(props);\n    this.trendChartRef = React.createRef();\n    this.rankChartRef = React.createRef();\n    this.genderChartRef = React.createRef();\n    this.ageChartRef = React.createRef();\n    this.prefChartRef = React.createRef();\n    this.dowChartRef = React.createRef();\n    this.visitorsChartRef = React.createRef();\n    this.exportContainerRef = React.createRef();\n    this.pptxNewRegChartRef = React.createRef();\n    this.pptxVisitorsChartRef = React.createRef();\n    this._charts = {};\n    this.onMonthChange = (e) => this.setState({ month: e.target.value });\n    this.onStoreChange = (e) => this.setState({ store: e.target.value, selectedRank: null });\n    this.onClearRankFilter = () => this.setState({ selectedRank: null });\n    this.onRankClick = (rankKey) => () => this.setState(s => ({ selectedRank: s.selectedRank === rankKey ? null : rankKey }));\n    this.onPrintAll = () => this.openExportModal();\n    this.onExportModalClose = () => this.setState({ exportModalOpen: false });\n    this.onExportToggleStore = (key) => () => this.setState(s => {\n      const next = new Set(s.exportChecked);\n      if (next.has(key)) next.delete(key); else next.add(key);\n      return { exportChecked: next };\n    });\n    this.onExportSelectAll = () => this.setState(s => ({ exportChecked: new Set(this._exportableStoreKeys || []) }));\n    this.onExportSelectNone = () => this.setState({ exportChecked: new Set() });\n    this.onExportConfirm = () => this.runBulkExport();\n  }\n\n  openExportModal(){\n    const D = window.DASHBOARD_DATA;\n    if (!D) return;\n    const keys = D.stores.filter(s => s.key !== '__ALL__').map(s => s.key);\n    this._exportableStoreKeys = keys;\n    this.setState({ exportModalOpen: true, exportChecked: new Set(keys) });\n  }\n\n  componentDidMount(){\n    this.scheduleDrawCharts(0);\n    this.waitForData();\n    window.__pptxGoTo = (i) => this.setState({ pptxIndex: i });\n    window.__pptxTotal = () => this.getPptxSlides().length;\n  }\n  componentDidUpdate(){\n    this.scheduleDrawCharts(0);\n    this.drawPptxCharts();\n  }\n\n  getPptxSlides(){\n    if (this._pptxSlidesCache) return this._pptxSlidesCache;\n    const D = window.DASHBOARD_DATA;\n    if (!D) return [];\n    const months = D.months;\n    const latestMonth = months[months.length-1];\n    const prevMonth = months.length>1 ? months[months.length-2] : null;\n    const monthLabel = latestMonth.replace('-','年')+'月';\n    const rankKeys = ['bronze','silver','gold','platinum'];\n    const deltaColor = (d) => d==null ? 'rgba(0,0,0,.35)' : d > 0 ? '#1F8A5B' : d < 0 ? '#c0524a' : 'rgba(0,0,0,.4)';\n    const deltaArrow = (d) => d==null ? '' : d > 0 ? '▲' : d < 0 ? '▼' : '±';\n    const pDelta = (curVal, prevVal) => prevVal==null ? null : curVal - prevVal;\n    const fmtDelta = (d) => d==null ? '−' : fmtInt(Math.abs(d));\n\n    const buildKpiCards = (md, pmd) => {\n      const custThisMonth = md.sales ? md.sales.customers : null;\n      const activeD = pDelta(md.active, pmd && pmd.active);\n      const totalD = pDelta(md.cumulativeTotal, pmd && pmd.cumulativeTotal);\n      const newRegD = pDelta(md.newReg, pmd && pmd.newReg);\n      const visitorsD = pDelta(md.visitors, pmd && pmd.visitors);\n      return [\n        { label:'新規会員登録数', value: fmtInt(md.newReg), unit:'人', deltaFmt: fmtDelta(newRegD), deltaColor: deltaColor(newRegD), deltaArrow: deltaArrow(newRegD) },\n        { label:'総会員数（累計）', value: fmtInt(md.cumulativeTotal), unit:'人', deltaFmt: fmtDelta(totalD), deltaColor: deltaColor(totalD), deltaArrow: deltaArrow(totalD), sub: custThisMonth ? `対客数比 ${fmtPct(md.cumulativeTotal/custThisMonth*100)}` : null },\n        { label:'アクティブ会員数（直近3カ月起動）', value: fmtInt(md.active), unit:'人', deltaFmt: fmtDelta(activeD), deltaColor: deltaColor(activeD), deltaArrow: deltaArrow(activeD), sub: custThisMonth ? `対客数比 ${fmtPct(md.active/custThisMonth*100)}` : null },\n        { label:'当月来店会員数', value: fmtInt(md.visitors), unit:'人', deltaFmt: fmtDelta(visitorsD), deltaColor: deltaColor(visitorsD), deltaArrow: deltaArrow(visitorsD), sub: custThisMonth ? `対客数比 ${fmtPct(md.visitors/custThisMonth*100)}` : null }\n      ];\n    };\n    const buildRankRows = (md, pmd) => {\n      const rTotal = rankKeys.reduce((s,k)=>s+md.rank[k],0) || 1;\n      return rankKeys.map(k => {\n        const d = pmd ? md.rank[k]-pmd.rank[k] : null;\n        return { label: RANK_LABELS[k], color: RANK_COLORS[k], countFmt: fmtInt(md.rank[k]), pctFmt: fmtPct(md.rank[k]/rTotal*100,0), barPct: +(md.rank[k]/rTotal*100).toFixed(1), deltaFmt: fmtDelta(d), deltaColor: deltaColor(d), deltaArrow: deltaArrow(d) };\n      });\n    };\n    const buildAgeRows = (md) => {\n      const ageMax = Math.max(md.age.u20, md.age.y20, md.age.y30, md.age.y40, md.age.y50, md.age.y60, 1);\n      return [\n        {label:'〜19', countFmt: fmtInt(md.age.u20), barPct: +(md.age.u20/ageMax*100).toFixed(1)},\n        {label:'20代', countFmt: fmtInt(md.age.y20), barPct: +(md.age.y20/ageMax*100).toFixed(1)},\n        {label:'30代', countFmt: fmtInt(md.age.y30), barPct: +(md.age.y30/ageMax*100).toFixed(1)},\n        {label:'40代', countFmt: fmtInt(md.age.y40), barPct: +(md.age.y40/ageMax*100).toFixed(1)},\n        {label:'50代', countFmt: fmtInt(md.age.y50), barPct: +(md.age.y50/ageMax*100).toFixed(1)},\n        {label:'60以上', countFmt: fmtInt(md.age.y60), barPct: +(md.age.y60/ageMax*100).toFixed(1)}\n      ];\n    };\n    const buildGeoRows = (md, isAll) => {\n      const geoDict = isAll ? md.pref : (md.city || md.pref);\n      const geoTotal = Object.values(geoDict).reduce((a,b)=>a+b,0) || 1;\n      return Object.entries(geoDict).filter(([k])=>k!=='その他').sort((a,b)=>b[1]-a[1]).slice(0,8)\n        .map(([name,count]) => ({ name, countFmt: fmtInt(count), pctFmt: fmtPct(count/geoTotal*100,0), barPct: +(count/geoTotal*100).toFixed(1) }));\n    };\n    const buildCouponRows = (md) => {\n      const total = md.coupon ? md.coupon.total : 0;\n      const rows = (md.coupon && md.coupon.byName.length) ? md.coupon.byName.filter(n=>n.name!=='その他').slice(0,8).map(n=>({ name:n.name, countFmt: fmtInt(n.count), pctFmt: total>0 ? fmtPct(n.count/total*100,0) : '−', barPct: total>0 ? +(n.count/total*100).toFixed(1) : 0 })) : [];\n      return { total, rows };\n    };\n\n    const allCur = D.data['__ALL__'][latestMonth];\n    const allPrev = prevMonth ? D.data['__ALL__'][prevMonth] : null;\n\n    const slides = [];\n    slides.push({ kind:'title', title:'会員データダッシュボード', subtitle:`アプリ会員 月次レポート　対象月：${monthLabel}` });\n    slides.push({ kind:'kpi', title:'会員情報サマリー（全店）', subtitle:monthLabel, kpiCards: buildKpiCards(allCur, allPrev) });\n    slides.push({ kind:'rank', title:'ランク分布（直近12カ月来店回数・全店）', subtitle:monthLabel, rankRows: buildRankRows(allCur, allPrev) });\n\n    const trendLabels = [], trendValues = [], vLabels = [], vVisitors = [], vRatio = [];\n    for (let i=11;i>=0;i--){\n      const idx = months.length-1-i;\n      if (idx < 0){ trendLabels.push(''); trendValues.push(0); vLabels.push(''); vVisitors.push(null); vRatio.push(null); continue; }\n      const m = months[idx];\n      const md = D.data['__ALL__'][m];\n      trendLabels.push(m.slice(5)); trendValues.push(md ? md.newReg : 0);\n      vLabels.push(m.slice(5)); vVisitors.push(md ? md.visitors : null);\n      const custV = md && md.sales ? md.sales.customers : null;\n      vRatio.push(custV && custV>0 && md && md.visitors!=null ? +(md.visitors/custV*100).toFixed(1) : null);\n    }\n    slides.push({ kind:'trend', title:'月次推移（直近12カ月・全店）', subtitle:'新規会員登録数 ／ 来店会員数（対客数比）', trend:{labels:trendLabels, values:trendValues}, visitors:{labels:vLabels, visitors:vVisitors, ratio:vRatio} });\n\n    const genderTotal = (allCur.gender.male+allCur.gender.female+allCur.gender.unknown) || 1;\n    slides.push({ kind:'demo', title:'性別・年代 人口動態（全店・累計会員）', subtitle:monthLabel,\n      genderRows: [\n        { label:'男性', color:'#1F8A5B', countFmt: fmtInt(allCur.gender.male), pctFmt: fmtPct(allCur.gender.male/genderTotal*100,0) },\n        { label:'女性', color:'#e08a9a', countFmt: fmtInt(allCur.gender.female), pctFmt: fmtPct(allCur.gender.female/genderTotal*100,0) },\n        { label:'不明', color:'#d8d5cd', countFmt: fmtInt(allCur.gender.unknown), pctFmt: fmtPct(allCur.gender.unknown/genderTotal*100,0) }\n      ],\n      ageRows: buildAgeRows(allCur)\n    });\n    slides.push({ kind:'geo', title:'居住地分布（都道府県・全店）', subtitle:monthLabel, geoRows: buildGeoRows(allCur, true) });\n\n    const couponTotals = [];\n    let grandTotal = 0;\n    for (const s of D.stores){ if (s.key==='__ALL__') continue; const md = D.data[s.key][latestMonth]; const t=(md&&md.coupon)?md.coupon.total:0; couponTotals.push({name:s.name, total:t}); grandTotal+=t; }\n    couponTotals.sort((a,b)=>b.total-a.total);\n    const couponStoreRows = couponTotals.filter(c=>c.total>0).slice(0,10).map((c,i)=>({ rank:i+1, name:c.name, countFmt: fmtInt(c.total), pctFmt: grandTotal>0?fmtPct(c.total/grandTotal*100):'−', barPct: grandTotal>0? +(c.total/grandTotal*100).toFixed(1):0 }));\n    slides.push({ kind:'coupon', title:'クーポン利用状況（全店ランキング）', subtitle:`${monthLabel}　※会員登録インセンティブは除く`, couponStoreRows, couponTotalFmt: fmtInt(grandTotal) });\n\n    for (const s of D.stores){\n      if (s.key === '__ALL__') continue;\n      const md = D.data[s.key][latestMonth];\n      const pmd = prevMonth ? D.data[s.key][prevMonth] : null;\n      if (!md) continue;\n      const genderTotalS = (md.gender.male+md.gender.female+md.gender.unknown) || 1;\n      const couponInfo = buildCouponRows(md);\n      slides.push({\n        kind:'store', title: s.name, subtitle: `会員データレポート　${monthLabel}`,\n        kpiCards: buildKpiCards(md, pmd),\n        rankRows: buildRankRows(md, pmd),\n        genderRows: [\n          { label:'男性', color:'#1F8A5B', countFmt: fmtInt(md.gender.male), pctFmt: fmtPct(md.gender.male/genderTotalS*100,0) },\n          { label:'女性', color:'#e08a9a', countFmt: fmtInt(md.gender.female), pctFmt: fmtPct(md.gender.female/genderTotalS*100,0) },\n          { label:'不明', color:'#d8d5cd', countFmt: fmtInt(md.gender.unknown), pctFmt: fmtPct(md.gender.unknown/genderTotalS*100,0) }\n        ],\n        ageRows: buildAgeRows(md),\n        geoRows: buildGeoRows(md, false),\n        couponStoreRows: null,\n        couponRows: couponInfo.rows, couponTotalFmt: fmtInt(couponInfo.total)\n      });\n    }\n\n    this._pptxSlidesCache = slides;\n    return slides;\n  }\n\n  drawPptxCharts(){\n    const idx = this.state.pptxIndex;\n    if (idx == null || idx < 0) return;\n    const slide = this.getPptxSlides()[idx];\n    if (!slide || slide.kind !== 'trend') return;\n    const accent = this.props.accentColor || '#1F8A5B';\n    if (this.pptxNewRegChartRef.current){\n      this.destroyChart('pptxNewReg');\n      this._charts.pptxNewReg = new Chart(this.pptxNewRegChartRef.current.getContext('2d'), {\n        type:'bar', data:{ labels: slide.trend.labels, datasets:[{ label:'新規会員登録数', data: slide.trend.values, backgroundColor: accent, borderRadius:4 }] },\n        options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:fa .reduce((a,b)=>a+b,0) || 1;\n        const geoRows = Object.entries(geoDictP).filter(([k])=>k!=='その他').sort((a,b)=>b[1]-a[1]).slice(0,5)\n          .map(([name,count]) => ({ name, countFmt: fmtInt(count), pctFmt: fmtPct(count/geoTotalP*100,0) }));\n        const couponTotalForPct = md.coupon ? md.coupon.total : 0;\n        const couponRows = (md.coupon && md.coupon.byName.length) ? md.coupon.byName.filter(n=>n.name!=='その他').slice(0,5).map(n=>({ name:n.name, countFmt: fmtInt(n.count), pctFmt: couponTotalForPct>0 ? fmtPct(n.count/couponTotalForPct*100,0) : '−' })) : [];\n\n        const newRegD = pDelta(md.newReg, pmd && pmd.newReg);\n        const totalD = pDelta(md.cumulativeTotal, pmd && pmd.cumulativeTotal);\n        const activeD = pDelta(md.active, pmd && pmd.active);\n        const visitorsD = pDelta(md.visitors, pmd && pmd.visitors);\n        const custThisMonthP = md.sales ? md.sales.customers : null;\n\n        return {\n          storeName: s.name, monthLabel: selMonth.replace('-','年')+'月', generatedDate: genDate,\n          newRegFmt: fmtInt(md.newReg), totalFmt: fmtInt(md.cumulativeTotal), activeFmt: fmtInt(md.active),\n          salesFmt: fmtInt(md.visitors),\n          newRegDeltaFmt: fmtDelta(newRegD), newRegDeltaColor: deltaColor(newRegD), newRegDeltaArrow: deltaArrow(newRegD),\n          totalDeltaFmt: fmtDelta(totalD), totalDeltaColor: deltaColor(totalD), totalDeltaArrow: deltaArrow(totalD),\n          activeDeltaFmt: fmtDelta(activeD), activeDeltaColor: deltaColor(activeD), activeDeltaArrow: deltaArrow(activeD),\n          visitorsDeltaFmt: fmtDelta(visitorsD), visitorsDeltaColor: deltaColor(visitorsD), visitorsDeltaArrow: deltaArrow(visitorsD),\n          visitorsRatioFmt: custThisMonthP ? fmtPct(md.visitors/custThisMonthP*100) : '−',\n          rankRows: rankRowsP, ageRows,\n          maleFmt: fmtInt(md.gender.male), femaleFmt: fmtInt(md.gender.female), unknownGenderFmt: fmtInt(md.gender.unknown),\n          malePctFmt: fmtPct(md.gender.male/genderTotalP*100,0), femalePctFmt: fmtPct(md.gender.female/genderTotalP*100,0), unknownGenderPctFmt: fmtPct(md.gender.unknown/genderTotalP*100,0),\n          geoRows,\n          couponTotalFmt: md.coupon ? fmtInt(md.coupon.total) : '0',\n          couponRows, couponEmpty: couponRows.length===0\n        };\n      });\n    }\n\n    this._computed = {\n      trend: { labels: trendLabels, values: trendValues },\n      rank: { labels: rankKeys.map(k=>RANK_LABELS[k]), values: rankKeys.map(k=>cur.rank[k]), colors: rankKeys.map(k=>RANK_COLORS[k]) },\n      gender: { values: [demoSource.gender.male, demoSource.gender.female, demoSource.gender.unknown] },\n      age: { labels: ['〜19','20代','30代','40代','50代','60以上'], values: [demoSource.age.u20, demoSource.age.y20, demoSource.age.y30, demoSource.age.y40, demoSource.age.y50, demoSource.age.y60] },\n      pref: { labels: prefTop.map(p=>p[0]), values: prefTop.map(p=>p[1]) },\n      dow: { values: cur.coupon ? cur.coupon.byDow : [0,0,0,0,0,0,0] },\n      visitorsSeries\n    };\n\n    const exportBtnLabel = exporting ? `出力中... ${exportIndex+1}/${exportTotal}` : '全店舗レポート PDF出力（1店舗1ファイル）';\n    const exportModalOpen = !!this.state.exportModalOpen;\n    const exportChecked = this.state.exportChecked || new Set();\n    const exportModalStores = D.stores.filter(s => s.key !== '__ALL__').map(s => ({ key: s.key, name: s.name, checked: exportChecked.has(s.key), onToggle: this.onExportToggleStore(s.key) }));\n    const exportCheckedCount = exportModalStores.filter(s => s.checked).length;\n    const exportConfirmLabel = `選択した${exportCheckedCount}店舗を出力`;\n    const exportConfirmDisabled = exportCheckedCount === 0;\n\n    return {\n      dataReady: true, dataNotReady: false,\n      printPages, exporting, exportBtnLabel, exportBtnOpacity: exporting ? 0.6 : 1,\n      onPrintAll: this.onPrintAll, exportContainerRef: this.exportContainerRef,\n      exportModalOpen, exportModalStores, exportConfirmLabel, exportConfirmDisabled, exportConfirmOpacity: exportConfirmDisabled ? 0.5 : 1, stopPropagation: (e) => e.stopPropagation(),\n      onExportModalClose: this.onExportModalClose, onExportToggleStore: this.onExportToggleStore,\n      onExportSelectAll: this.onExportSelectAll, onExportSelectNone: this.onExportSelectNone, onExportConfirm: this.onExportConfirm,\n      selMonth, selMonthLabel: selMonth.replace('-','年')+'月',\n      selStore, selStoreLabel: storeObj.name,\n      monthOptions, storeOptions,\n      monthSelectEl: React.createElement('select', {\n        value: selMonth, onChange: this.onMonthChange,\n        style: { WebkitAppearance:'none', appearance:'none', padding:'8px 30px 8px 12px', borderRadius:8, border:'1px solid rgba(0,0,0,.15)', backgroundColor:'#ffffff', fontSize:14, fontWeight:600, color:'#1c1c1a', width:150, height:38, lineHeight:'20px', boxSizing:'border-box', colorScheme:'light' }\n      }, monthOptions.map(m => React.createElement('option', { key: m.value, value: m.value }, m.label))),\n      storeSelectEl: React.createElement('select', {\n        value: selStore, onChange: this.onStoreChange,\n        style: { WebkitAppearance:'none', appearance:'none', padding:'8px 30px 8px 12px', borderRadius:8, border:'1px solid rgba(0,0,0,.15)', backgroundColor:'#ffffff', fontSize:14, fontWeight:600, color:'#1c1c1a', width:200, height:38, lineHeight:'20px', boxSizing:'border-box', colorScheme:'light' }\n      }, storeOptions.map(s => React.createElement('option', { key: s.key, value: s.key }, s.label))),\n      onMonthChange: this.onMonthChange, onStoreChange: this.onStoreChange,\n      kpi, rankRows, demo,\n      rankFilterActive, rankFilterLabel, onClearRankFilter: this.onClearRankFilter,\n      couponRanking, couponNameRows, couponNameEmpty: couponNameRows.length===0,\n      prefOrCityLabel,\n      showSalesReference: this.props.showSalesReference ?? true,\n      trendChartRef: this.trendChartRef, rankChartRef: this.rankChartRef,\n      genderChartRef: this.genderChartRef, ageChartRef: this.ageChartRef,\n      prefChartRef: this.prefChartRef, dowChartRef: this.dowChartRef, visitorsChartRef: this.visitorsChartRef,\n      accentColor: this.props.accentColor || '#1F8A5B',\n      pptxActive: this.state.pptxIndex != null && this.state.pptxIndex >= 0,\n      pptxSlide: (() => {\n        const s = (this.state.pptxIndex != null && this.state.pptxIndex >= 0) ? this.getPptxSlides()[this.state.pptxIndex] : null;\n        if (!s) return { kind:'none', isTitle:false, isKpi:false, isRank:false, isTrend:false, isDemo:false, isGeo:false, isCoupon:false, isStore:false, isCouponOverview:false, isCouponStore:false };\n        return Object.assign({}, s, {\n          isTitle: s.kind==='title', isKpi: s.kind==='kpi', isRank: s.kind==='rank', isTrend: s.kind==='trend',\n          isDemo: s.kind==='demo', isGeo: s.kind==='geo', isCoupon: s.kind==='coupon', isStore: s.kind==='store',\n          isCouponOverview: s.kind==='coupon', isCouponStore: s.kind==='store',\n          showKpiSection: s.kind==='kpi' || s.kind==='store',\n          showRankSection: s.kind==='rank' || s.kind==='store',\n          showDemoSection: s.kind==='demo' || s.kind==='store',\n          showGeoSection: s.kind==='geo' || s.kind==='store',\n          layoutCompact: s.kind==='store',\n          geoLabel: s.kind==='geo' ? '都道府県' : '市区町村'\n        });\n      })(),\n      pptxNewRegChartRef: this.pptxNewRegChartRef, pptxVisitorsChartRef: this.pptxVisitorsChartRef,\n      pptxDisplay: (this.state.pptxIndex != null && this.state.pptxIndex >= 0) ? 'flex' : 'none',\n      pptxHeaderVisible: (this.state.pptxIndex != null && this.state.pptxIndex >= 0) && this.getPptxSlides()[this.state.pptxIndex] && this.getPptxSlides()[this.state.pptxIndex].kind !== 'title',\n      pptxTitleSize: (this.getPptxSlides()[this.state.pptxIndex] && this.getPptxSlides()[this.state.pptxIndex].kind === 'store') ? 34 : 30,\n      pptxSectionGap: (this.getPptxSlides()[this.state.pptxIndex] && this.getPptxSlides()[this.state.pptxIndex].kind === 'st
