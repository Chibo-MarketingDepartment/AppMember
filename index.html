  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"6ee9fea2-c5dd-4799-ab32-c81cda97e5e4\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n\n<helmet data-dc-atomics=\"\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n  <style>\n    body{margin:0;background:#f7f7f5}\n    ::-webkit-scrollbar{width:8px;height:8px}\n    ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:4px}\n    a{color:{{ accentColor }};text-decoration:none}\n    a:hover{color:{{ accentColor }};text-decoration:underline}\n    select{font:inherit}\n  <\u002Fstyle>\n  <script src=\"8b09c1a7-9ea0-4fe3-b3d2-c6c4714c3a74\"><\u002Fscript>\n  <script src=\"da8229f7-8d14-4bd3-bec0-5cfd2e3cab61\"><\u002Fscript>\n  <script src=\"0148bcad-6363-46e0-b75a-8c379f387492\"><\u002Fscript>\n  <script src=\"194f4154-9312-4565-884b-d618148a4311\"><\u002Fscript>\n<\u002Fhelmet>\n\n<div style=\"font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;color:#1c1c1a;min-height:100vh;background:#f7f7f5;padding-bottom:48px\">\n\n  <sc-if value=\"{{ dataReady }}\" hint-placeholder-val=\"{{ false }}\">\n\n  <!-- Header + Filter bar -->\n  <div style=\"position:sticky;top:0;z-index:20;background:#ffffff;borderBottom:1px solid rgba(0,0,0,.08);box-shadow:0 1px 0 rgba(0,0,0,.04)\">\n    <div style=\"max-width:1320px;margin:0 auto;padding:16px 20px;display:flex;flex-wrap:wrap;align-items:center;gap:16px 24px\">\n      <div style=\"display:flex;flex-direction:column;gap:2px;margin-right:auto\">\n        <div style=\"font-size:19px;font-weight:700;letter-spacing:.01em\">会員データダッシュボード<\u002Fdiv>\n        <div style=\"font-size:12.5px;color:rgba(0,0,0,.45)\">アプリ会員 月次レポート ・ データ更新: 2026/07/07<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;gap:10px 18px;align-items:center\">\n        <label style=\"display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(0,0,0,.6);flexShrink:0\">\n          対象期間\n          <span style=\"position:relative;display:inline-block;flexShrink:0\">\n            <select value=\"{{ selMonth }}\" onchange=\"{{ onMonthChange }}\" style=\"WebkitAppearance:none;appearance:none;padding:8px 30px 8px 12px;borderRadius:8px;border:1px solid rgba(0,0,0,.15);backgroundColor:#ffffff;fontSize:14px;fontWeight:600;color:#1c1c1a;width:150px;height:38px;lineHeight:20px;boxSizing:border-box\">\n              <sc-for list=\"{{ monthOptions }}\" as=\"m\" hint-placeholder-count=\"3\">\n                <option value=\"{{ m.value }}\">{{ m.label }}<\u002Foption>\n              <\u002Fsc-for>\n            <\u002Fselect>\n            <span style=\"position:absolute;right:10px;top:50%;transform:translateY(-50%);pointerEvents:none;fontSize:10px;color:rgba(0,0,0,.4)\">▾<\u002Fspan>\n          <\u002Fspan>\n        <\u002Flabel>\n        <label style=\"display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(0,0,0,.6);flexShrink:0\">\n          店舗\n          <span style=\"position:relative;display:inline-block;flexShrink:0\">\n            <select value=\"{{ selStore }}\" onchange=\"{{ onStoreChange }}\" style=\"WebkitAppearance:none;appearance:none;padding:8px 30px 8px 12px;borderRadius:8px;border:1px solid rgba(0,0,0,.15);backgroundColor:#ffffff;fontSize:14px;fontWeight:600;color:#1c1c1a;width:200px;height:38px;lineHeight:20px;boxSizing:border-box\">\n              <sc-for list=\"{{ storeOptions }}\" as=\"s\" hint-placeholder-count=\"3\">\n                <option value=\"{{ s.key }}\">{{ s.label }}<\u002Foption>\n              <\u002Fsc-for>\n            <\u002Fselect>\n            <span style=\"position:absolute;right:10px;top:50%;transform:translateY(-50%);pointerEvents:none;fontSize:10px;color:rgba(0,0,0,.4)\">▾<\u002Fspan>\n          <\u002Fspan>\n        <\u002Flabel>\n        <button onclick=\"{{ onPrintAll }}\" disabled=\"{{ exporting }}\" style=\"padding:8px 14px;border-radius:8px;border:1px solid {{ accentColor }};background:#fff;color:{{ accentColor }};font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;opacity:{{ exportBtnOpacity }}\">{{ exportBtnLabel }}<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"max-width:1320px;margin:0 auto;padding:24px 20px 0\">\n\n    <!-- KPI cards -->\n    <div style=\"display:grid;gridTemplateColumns:repeat(auto-fit, minmax(240px, 1fr));gap:16px;margin-bottom:20px\">\n\n      <!-- 新規会員登録数 -->\n      <div style=\"background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:14px;padding:18px 20px;display:flex;flex-direction:column;gap:10px\">\n        <div style=\"font-size:12.5px;color:rgba(0,0,0,.5);font-weight:600\">新規会員登録数（{{ selMonthLabel }}）<\u002Fdiv>\n        <div style=\"display:flex;align-items:baseline;gap:8px\">\n          <div style=\"font-size:30px;font-weight:800;letter-spacing:-.01em\">{{ kpi.newRegFmt }}<\u002Fdiv>\n          <div style=\"font-size:12.5px;color:rgba(0,0,0,.4)\">人<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"height:56px\">\n          <canvas ref=\"{{ trendChartRef }}\"><\u002Fcanvas>\n        <\u002Fdiv>\n        <div style=\"font-size:11.5px;color:rgba(0,0,0,.4)\">直近12カ月推移<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 総会員数 -->\n      <div style=\"background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:14px;padding:18px 20px;display:flex;flex-direction:column;gap:8px\">\n        <div style=\"font-size:12.5px;color:rgba(0,0,0,.5);font-weight:600\">総会員数（累計・{{ selMonthLabel }}時点）<\u002Fdiv>\n        <div style=\"display:flex;align-items:baseline;gap:8px\">\n          <div style=\"font-size:30px;font-weight:800;letter-spacing:-.01em\">{{ kpi.totalMembersFmt }}<\u002Fdiv>\n          <div style=\"font-size:12.5px;color:rgba(0,0,0,.4)\">人<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:{{ kpi.totalMembersDeltaColor }}\">\n          <span>{{ kpi.totalMembersDeltaArrow }}<\u002Fspan><span>{{ kpi.totalMembersDeltaFmt }}<\u002Fspan>\n          <span style=\"font-weight:400;color:rgba(0,0,0,.4)\">先月比<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"margin-top:4px;padding-top:10px;borderTop:1px dashed rgba(0,0,0,.1);font-size:12.5px;color:rgba(0,0,0,.55)\">\n          対客数比（当月）　<b style=\"color:#1c1c1a;font-size:14px\">{{ kpi.memberRatioFmt }}<\u002Fb>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- アクティブ会員数 -->\n      <div style=\"background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:14px;padding:18px 20px;display:flex;flex-direction:column;gap:8px\">\n        <div style=\"font-size:12.5px;color:rgba(0,0,0,.5);font-weight:600\">アクティブ会員数（直近3カ月起動）<\u002Fdiv>\n        <div style=\"display:flex;align-items:baseline;gap:8px\">\n          <div style=\"font-size:30px;font-weight:800;letter-spacing:-.01em\">{{ kpi.activeFmt }}<\u002Fdiv>\n          <div style=\"font-size:12.5px;color:rgba(0,0,0,.4)\">人<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:{{ kpi.activeDeltaColor }}\">\n          <span>{{ kpi.activeDeltaArrow }}<\u002Fspan><span>{{ kpi.activeDeltaFmt }}<\u002Fspan>\n          <span style=\"font-weight:400;color:rgba(0,0,0,.4)\">先月比<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"margin-top:4px;padding-top:10px;borderTop:1px dashed rgba(0,0,0,.1);font-size:12.5px;color:rgba(0,0,0,.55)\">\n          対客数比（当月）　<b style=\"color:#1c1c1a;font-size:14px\">{{ kpi.activeRatioFmt }}<\u002Fb>　・　会員比 <b style=\"color:#1c1c1a;font-size:14px\">{{ kpi.activeOfMemberFmt }}<\u002Fb>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 当月来店会員数 -->\n      <div style=\"background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:14px;padding:18px 20px;display:flex;flex-direction:column;gap:8px\">\n        <div style=\"font-size:12.5px;color:rgba(0,0,0,.5);font-weight:600\">当月来店会員数（{{ selMonthLabel }}）<\u002Fdiv>\n        <div style=\"display:flex;align-items:baseline;gap:8px\">\n          <div style=\"font-size:30px;font-weight:800;letter-spacing:-.01em\">{{ kpi.visitorsFmt }}<\u002Fdiv>\n          <div style=\"font-size:12.5px;color:rgba(0,0,0,.4)\">人<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:{{ kpi.visitorsDeltaColor }}\">\n          <span>{{ kpi.visitorsDeltaArrow }}<\u002Fspan><span>{{ kpi.visitorsDeltaFmt }}<\u002Fspan>\n          <span style=\"font-weight:400;color:rgba(0,0,0,.4)\">先月比<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"margin-top:4px;padding-top:10px;borderTop:1px dashed rgba(0,0,0,.1);font-size:12.5px;color:rgba(0,0,0,.55)\">\n          対客数比（当月）　<b style=\"color:#1c1c1a;font-size:14px\">{{ kpi.visitorsRatioFmt }}<\u002Fb>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ランク分布 + 性別年代 + 居住地 -->\n    <div style=\"display:grid;gridTemplateColumns:repeat(auto-fit, minmax(320px, 1fr));gap:16px;margin-bottom:20px\">\n\n      <!-- ランク分布 -->\n      <div style=\"background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:14px;padding:20px\">\n        <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px\">\n          <div style=\"font-size:14px;font-weight:700\">ランク分布（直近12カ月の来店回数）<\u002Fdiv>\n          <div style=\"font-size:11.5px;color:rgba(0,0,0,.4)\">0回=ブロンズ / 1〜3=シルバー / 4〜6=ゴールド / 7回以上=プラチナ<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:20px;align-items:center\">\n          <div style=\"width:150px;height:150px;flex:none\"><canvas ref=\"{{ rankChartRef }}\"><\u002Fcanvas><\u002Fdiv>\n          <div style=\"flex:1;display:flex;flex-direction:column;gap:8px\">\n            <sc-for list=\"{{ rankRows }}\" as=\"r\" hint-placeholder-count=\"4\">\n              <div onclick=\"{{ r.onClick }}\" style=\"display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;padding:6px 8px;border-radius:8px;background:{{ r.rowBg }};border:1px solid {{ r.rowBorder }}\">\n                <div style=\"width:10px;height:10px;border-radius:3px;background:{{ r.color }};flex:none\"><\u002Fdiv>\n                <div style=\"width:64px;color:rgba(0,0,0,.6)\">{{ r.label }}<\u002Fdiv>\n                <div style=\"width:56px;font-weight:700\">{{ r.countFmt }}人<\u002Fdiv>\n                <div style=\"width:48px;color:rgba(0,0,0,.4)\">{{ r.pctFmt }}<\u002Fdiv>\n                <div style=\"font-size:11.5px;font-weight:700;color:{{ r.deltaColor }}\">{{ r.deltaArrow }}{{ r.deltaFmt }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <sc-if value=\"{{ rankFilterActive }}\" hint-placeholder-val=\"{{ false }}\">\n              <div onclick=\"{{ onClearRankFilter }}\" style=\"cursor:pointer;font-size:12px;color:{{ accentColor }};font-weight:700;padding:4px 8px\">✕ 絞り込み解除<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 性別＆年代 -->\n      <div style=\"background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:14px;padding:20px\">\n        <div style=\"display:flex;flex-direction:column;gap:4px;margin-bottom:12px\">\n          <div style=\"font-size:14px;font-weight:700\">性別 ／ 年代 人口動態（累計会員）<\u002Fdiv>\n          <sc-if value=\"{{ rankFilterActive }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"margin-top:4px;font-size:11.5px;font-weight:700;color:{{ accentColor }};background:rgba(31,138,91,.1);padding:2px 8px;border-radius:6px;display:inline-block;width:fit-content\">{{ rankFilterLabel }}<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:20px;align-items:center;margin-bottom:14px\">\n          <div style=\"width:100px;height:100px;flex:none\"><canvas ref=\"{{ genderChartRef }}\"><\u002Fcanvas><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:6px;font-size:13px\">\n            <div style=\"display:flex;align-items:center;gap:8px\"><div style=\"width:10px;height:10px;border-radius:3px;background:{{ accentColor }}\"><\u002Fdiv>男性 {{ demo.maleFmt }}（{{ demo.malePctFmt }}）<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px\"><div style=\"width:10px;height:10px;border-radius:3px;background:#e08a9a\"><\u002Fdiv>女性 {{ demo.femaleFmt }}（{{ demo.femalePctFmt }}）<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px\"><div style=\"width:10px;height:10px;border-radius:3px;background:#d8d5cd\"><\u002Fdiv>不明 {{ demo.unknownFmt }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"height:150px\"><canvas ref=\"{{ ageChartRef }}\"><\u002Fcanvas><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 居住地分布 -->\n      <div style=\"background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:14px;padding:20px\">\n        <div style=\"display:flex;flex-direction:column;gap:4px;margin-bottom:12px\">\n          <div style=\"font-size:14px;font-weight:700\">居住地分布（{{ prefOrCityLabel }}・上位10）<\u002Fdiv>\n          <div style=\"font-size:11px;color:rgba(0,0,0,.35)\">郵便番号から住所を近似<\u002Fdiv>\n          <sc-if value=\"{{ rankFilterActive }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"margin-top:4px;font-size:11.5px;font-weight:700;color:{{ accentColor }};background:rgba(31,138,91,.1);padding:2px 8px;border-radius:6px;display:inline-block;width:fit-content\">{{ rankFilterLabel }}<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <div style=\"height:260px\"><canvas ref=\"{{ prefChartRef }}\"><\u002Fcanvas><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- クーポン -->\n    <div style=\"display:grid;gridTemplateColumns:minmax(320px,1.3fr) minmax(280px,1fr);gap:16px;margin-bottom:20px\">\n      <div style=\"background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:14px;padding:20px\">\n        <div style=\"font-size:14px;font-weight:700;margin-bottom:4px\">クーポン回収 店舗別ランキング（{{ selMonthLabel }}）<\u002Fdiv>\n        <div style=\"font-size:11.5px;color:rgba(0,0,0,.4);margin-bottom:12px\">利用件数の構成比 ・ 全アプリ導入店舗中<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:2px;max-height:360px;overflow:auto\">\n          <div style=\"display:flex;font-size:11.5px;color:rgba(0,0,0,.4);padding:4px 8px;position:sticky;top:0;background:#fff\">\n            <div style=\"width:32px\">順位<\u002Fdiv><div style=\"flex:1\">店舗名<\u002Fdiv><div style=\"width:70px;text-align:right\">利用数<\u002Fdiv><div style=\"width:70px;text-align:right\">構成比<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-for list=\"{{ couponRanking }}\" as=\"c\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex;align-items:center;padding:8px;border-radius:8px;font-size:13px;background:{{ c.rowBg }}\">\n              <div style=\"width:32px;color:rgba(0,0,0,.4)\">{{ c.rank }}<\u002Fdiv>\n              <div style=\"flex:1;font-weight:{{ c.weight }};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px\">{{ c.name }}<\u002Fdiv>\n              <div style=\"width:70px;text-align:right;font-weight:700\">{{ c.countFmt }}<\u002Fdiv>\n              <div style=\"width:70px;text-align:right;color:rgba(0,0,0,.5)\">{{ c.pctFmt }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:16px\">\n        <div>\n          <div style=\"font-size:14px;font-weight:700;margin-bottom:8px\">曜日別クーポン利用（{{ selStoreLabel }}）<\u002Fdiv>\n          <div style=\"height:120px\"><canvas ref=\"{{ dowChartRef }}\"><\u002Fcanvas><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border-top:1px solid rgba(0,0,0,.06);padding-top:14px\">\n          <div style=\"font-size:14px;font-weight:700;margin-bottom:8px\">利用クーポン内訳（{{ selStoreLabel }}）<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:6px;max-height:150px;overflow:auto\">\n            <sc-for list=\"{{ couponNameRows }}\" as=\"n\" hint-placeholder-count=\"5\">\n              <div style=\"display:flex;align-items:center;gap:8px;font-size:12.5px\">\n                <div style=\"flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:rgba(0,0,0,.65)\">{{ n.name }}<\u002Fdiv>\n                <div style=\"font-weight:700\">{{ n.countFmt }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <sc-if value=\"{{ couponNameEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"font-size:12.5px;color:rgba(0,0,0,.35);padding:8px 0\">この期間・店舗の利用データはありません<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 月次来店会員数の推移 -->\n    <sc-if value=\"{{ showSalesReference }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:14px;padding:20px;margin-bottom:20px\">\n      <div style=\"display:flex;flex-direction:column;gap:2px;margin-bottom:8px\">\n        <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:12px\">\n          <div style=\"font-size:14px;font-weight:700\">月次来店会員数の推移（対客数比）<\u002Fdiv>\n          <div style=\"font-size:11px;color:rgba(0,0,0,.4);white-space:nowrap;flex:none\">直近12カ月<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:12px;color:rgba(0,0,0,.45)\">{{ selStoreLabel }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:11.5px;color:rgba(0,0,0,.4);margin-bottom:12px\">来店スタンプを利用した会員数と、店舗全体の客数実績（POS）を比較しています<\u002Fdiv>\n      <div style=\"height:220px\"><canvas ref=\"{{ visitorsChartRef }}\"><\u002Fcanvas><\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- Methodology footer -->\n    <details style=\"background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:14px;padding:16px 20px;margin-bottom:32px;font-size:12.5px;color:rgba(0,0,0,.55);line-height:1.8\">\n      <summary style=\"cursor:pointer;font-weight:700;color:#1c1c1a\">データ・集計方法について<\u002Fsummary>\n      <div style=\"margin-top:8px\">\n        ・集計対象は「会員登録状況」「来店スタンプ」「クーポン利用」「月別売上実績」の提供データ（2025/04〜2026/06、対象月フィルタ）。<br>\n        ・店舗は「店舗マスタ（shop_data）」記載の27アプリ実施店舗のみを対象。会員データとは店舗IDで突合。ヨドバシHD池袋ビル支店→リンクス池袋支店、堺高島屋支店→堺東支店は店舗IDが同一のため自動的に統合されています。<br>\n        ・総会員数は各店舗の累計登録者数（登録月が対象月以前の会員）。アクティブ会員数は会員登録状況の「最終起動日」が対象月を含む直近3カ月以内である会員数（アプリを起動した会員数）。<br>\n        ・「対客数比」の分母は当月の店舗売上データの客数実績。総会員数は累計、来店会員数・アクティブ会員数は単月/直近3カ月の値のため、性質の異なる指標の比較値（あくまで参考）です。<br>\n        ・当月来店会員数は、当月中に来店スタンプを1回以上利用した会員の実人数（同一会員の複数回来店は1人としてカウント）。<br>\n        ・ランク分布は対象月を含む直近12カ月の来店回数（0回=ブロンズ、1〜3回=シルバー、4〜6回=ゴールド、7回以上=プラチナ）。<br>\n        ・居住地分布は日本郵便の郵便番号データ（KEN_ALL）による住所近似。全店選択時は都道府県、個店選択時は市区町村で表示（郵便番号が対応表にない場合は「不明」）。<br>\n\n        ・クーポン集計は「会員登録_インセンティブ」系クーポン（新規登録特典）を除いて集計しています。\n      <\u002Fdiv>\n    <\u002Fdetails>\n  <\u002Fdiv>\n\n  <\u002Fsc-if>\n  <sc-if value=\"{{ dataNotReady }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"display:flex;align-items:center;justify-content:center;height:60vh;color:rgba(0,0,0,.4);font-size:14px\">データを読み込み中...<\u002Fdiv>\n  <\u002Fsc-if>\n\n  <div style=\"position:fixed;left:-99999px;top:0;background:#fff;pointerEvents:none\" ref=\"{{ exportContainerRef }}\">\n      <sc-for list=\"{{ printPages }}\" as=\"pg\" hint-placeholder-count=\"0\">\n        <div style=\"width:210mm;minHeight:297mm;padding:14mm 16mm;boxSizing:border-box;fontFamily:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;color:#1c1c1a\">\n          <div style=\"display:flex;align-items:baseline;justify-content:space-between;borderBottom:2px solid #1c1c1a;paddingBottom:10px;marginBottom:16px\">\n            <div style=\"font-size:20px;font-weight:800\">{{ pg.storeName }}　会員データレポート<\u002Fdiv>\n            <div style=\"font-size:12px;color:rgba(0,0,0,.5)\">対象月：{{ pg.monthLabel }}　｜　出力日：{{ pg.generatedDate }}<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:grid;gridTemplateColumns:repeat(4,1fr);gap:10px;margin-bottom:16px\">\n            <div style=\"border:1px solid rgba(0,0,0,.15);borderRadius:8px;padding:10px 12px\">\n              <div style=\"font-size:10.5px;color:rgba(0,0,0,.5)\">新規会員登録数<\u002Fdiv>\n              <div style=\"font-size:20px;font-weight:800\">{{ pg.newRegFmt }}<span style=\"font-size:11px;font-weight:400\">人<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:10.5px;font-weight:700;color:{{ pg.newRegDeltaColor }};margin-top:2px\">{{ pg.newRegDeltaArrow }}{{ pg.newRegDeltaFmt }} <span style=\"font-weight:400;color:rgba(0,0,0,.4)\">前月比<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"border:1px solid rgba(0,0,0,.15);borderRadius:8px;padding:10px 12px\">\n              <div style=\"font-size:10.5px;color:rgba(0,0,0,.5)\">総会員数（累計）<\u002Fdiv>\n              <div style=\"font-size:20px;font-weight:800\">{{ pg.totalFmt }}<span style=\"font-size:11px;font-weight:400\">人<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:10.5px;font-weight:700;color:{{ pg.totalDeltaColor }};margin-top:2px\">{{ pg.totalDeltaArrow }}{{ pg.totalDeltaFmt }} <span style=\"font-weight:400;color:rgba(0,0,0,.4)\">前月比<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"border:1px solid rgba(0,0,0,.15);borderRadius:8px;padding:10px 12px\">\n              <div style=\"font-size:10.5px;color:rgba(0,0,0,.5)\">アクティブ会員数<\u002Fdiv>\n              <div style=\"font-size:20px;font-weight:800\">{{ pg.activeFmt }}<span style=\"font-size:11px;font-weight:400\">人<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:10.5px;font-weight:700;color:{{ pg.activeDeltaColor }};margin-top:2px\">{{ pg.activeDeltaArrow }}{{ pg.activeDeltaFmt }} <span style=\"font-weight:400;color:rgba(0,0,0,.4)\">前月比<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"border:1px solid rgba(0,0,0,.15);borderRadius:8px;padding:10px 12px\">\n              <div style=\"font-size:10.5px;color:rgba(0,0,0,.5)\">当月来店会員数<\u002Fdiv>\n              <div style=\"font-size:20px;font-weight:800\">{{ pg.salesFmt }}<span style=\"font-size:11px;font-weight:400\">人<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:10.5px;font-weight:700;color:{{ pg.visitorsDeltaColor }};margin-top:2px\">{{ pg.visitorsDeltaArrow }}{{ pg.visitorsDeltaFmt }} <span style=\"font-weight:400;color:rgba(0,0,0,.4)\">前月比<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:10.5px;color:rgba(0,0,0,.5);margin-top:1px\">対客数比 <b style=\"color:#1c1c1a\">{{ pg.visitorsRatioFmt }}<\u002Fb><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"display:grid;gridTemplateColumns:1fr 1fr;gap:14px\">\n            <div style=\"border:1px solid rgba(0,0,0,.15);borderRadius:8px;padding:12px 14px\">\n              <div style=\"font-size:12.5px;font-weight:700;margin-bottom:8px\">ランク分布（直近12カ月来店回数）<\u002Fdiv>\n              <sc-for list=\"{{ pg.rankRows }}\" as=\"r\" hint-placeholder-count=\"4\">\n                <div style=\"display:flex;align-items:center;gap:8px;font-size:11.5px;margin-bottom:5px\">\n                  <div style=\"width:8px;height:8px;borderRadius:2px;background:{{ r.color }};flex:none\"><\u002Fdiv>\n                  <div style=\"width:56px;color:rgba(0,0,0,.6)\">{{ r.label }}<\u002Fdiv>\n                  <div style=\"flex:1;background:rgba(0,0,0,.06);borderRadius:4px;height:8px;overflow:hidden\">\n                    <div style=\"width:{{ r.barPct }}%;height:100%;background:{{ r.color }}\"><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"width:56px;text-align:right;font-weight:700\">{{ r.countFmt }}人<\u002Fdiv>\n                  <div style=\"width:56px;text-align:right;font-size:10.5px;font-weight:700;color:{{ r.deltaColor }}\">{{ r.deltaArrow }}{{ r.deltaFmt }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"border:1px solid rgba(0,0,0,.15);borderRadius:8px;padding:12px 14px\">\n              <div style=\"font-size:12.5px;font-weight:700;margin-bottom:8px\">性別・年代<\u002Fdiv>\n              <div style=\"font-size:11.5px;margin-bottom:8px\">男性 {{ pg.maleFmt }}人（{{ pg.malePctFmt }}）　・　女性 {{ pg.femaleFmt }}人（{{ pg.femalePctFmt }}）　・　不明 {{ pg.unknownGenderFmt }}人（{{ pg.unknownGenderPctFmt }}）<\u002Fdiv>\n              <sc-for list=\"{{ pg.ageRows }}\" as=\"a\" hint-placeholder-count=\"6\">\n                <div style=\"display:flex;align-items:center;gap:8px;font-size:11px;margin-bottom:4px\">\n                  <div style=\"width:36px;color:rgba(0,0,0,.6)\">{{ a.label }}<\u002Fdiv>\n                  <div style=\"flex:1;background:rgba(0,0,0,.06);borderRadius:4px;height:7px;overflow:hidden\">\n                    <div style=\"width:{{ a.barPct }}%;height:100%;background:{{ accentColor }}\"><\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"width:44px;text-align:right;font-weight:700\">{{ a.countFmt }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"border:1px solid rgba(0,0,0,.15);borderRadius:8px;padding:12px 14px\">\n              <div style=\"font-size:12.5px;font-weight:700;margin-bottom:8px\">居住地分布（上位5）<\u002Fdiv>\n              <sc-for list=\"{{ pg.geoRows }}\" as=\"g\" hint-placeholder-count=\"5\">\n                <div style=\"display:flex;align-items:center;gap:8px;font-size:11.5px;margin-bottom:5px\">\n                  <div style=\"flex:1;color:rgba(0,0,0,.65)\">{{ g.name }}<\u002Fdiv>\n                  <div style=\"font-weight:700\">{{ g.countFmt }}人<\u002Fdiv>\n                  <div style=\"width:44px;text-align:right;color:rgba(0,0,0,.4)\">{{ g.pctFmt }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <div style=\"border:1px solid rgba(0,0,0,.15);borderRadius:8px;padding:12px 14px\">\n              <div style=\"font-size:12.5px;font-weight:700;margin-bottom:8px\">クーポン利用（上位5・合計{{ pg.couponTotalFmt }}件）<\u002Fdiv>\n              <sc-for list=\"{{ pg.couponRows }}\" as=\"c\" hint-placeholder-count=\"5\">\n                <div style=\"display:flex;align-items:center;gap:8px;font-size:11.5px;margin-bottom:5px\">\n                  <div style=\"flex:1;color:rgba(0,0,0,.65);overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ c.name }}<\u002Fdiv>\n                  <div style=\"font-weight:700\">{{ c.countFmt }}<\u002Fdiv>\n                  <div style=\"width:44px;text-align:right;color:rgba(0,0,0,.4)\">{{ c.pctFmt }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n              <sc-if value=\"{{ pg.couponEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"font-size:11px;color:rgba(0,0,0,.35)\">利用データなし<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:14px;font-size:9.5px;color:rgba(0,0,0,.4)\">\n            アクティブ会員＝直近3カ月以内にアプリを起動した会員。ランクは直近12カ月の来店回数（0回=ブロンズ／1〜3回=シルバー／4〜6回=ゴールド／7回以上=プラチナ）。居住地は郵便番号からの近似。クーポンは会員登録インセンティブを除く。\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1400,&quot;height&quot;:1600},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#1F8A5B&quot;,&quot;options&quot;:[&quot;#1F8A5B&quot;,&quot;#2A6FDB&quot;,&quot;#D97757&quot;,&quot;#7C5CBF&quot;,&quot;#0F172A&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;showSalesReference&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\n\nconst RANK_COLORS = { bronze:'#b08d57', silver:'#9aa0a6', gold:'#d4a72c', platinum:'#5b6b8c' };\nconst RANK_LABELS = { bronze:'ブロンズ', silver:'シルバー', gold:'ゴールド', platinum:'プラチナ' };\nconst DOW_LABELS = ['日','月','火','水','木','金','土'];\n\nfunction fmtInt(n){ return (n==null || isNaN(n)) ? '−' : Math.round(n).toLocaleString('ja-JP'); }\nfunction fmtPct(n, digits){ return (n==null || isNaN(n)) ? '−' : n.toFixed(digits==null?1:digits) + '%'; }\nfunction fmtYen(n){ return (n==null || isNaN(n)) ? '−' : Math.round(n).toLocaleString('ja-JP'); }\n\nclass Component extends DCLogic {\n  state = { month: null, store: '__ALL__', selectedRank: null, exporting: false, exportIndex: -1, exportTotal: 0 };\n\n  constructor(props){\n    super(props);\n    this.trendChartRef = React.createRef();\n    this.rankChartRef = React.createRef();\n    this.genderChartRef = React.createRef();\n    this.ageChartRef = React.createRef();\n    this.prefChartRef = React.createRef();\n    this.dowChartRef = React.createRef();\n    this.visitorsChartRef = React.createRef();\n    this.exportContainerRef = React.createRef();\n    this._charts = {};\n    this.onMonthChange = (e) => this.setState({ month: e.target.value });\n    this.onStoreChange = (e) => this.setState({ store: e.target.value, selectedRank: null });\n    this.onClearRankFilter = () => this.setState({ selectedRank: null });\n    this.onRankClick = (rankKey) => () => this.setState(s => ({ selectedRank: s.selectedRank === rankKey ? null : rankKey }));\n    this.onPrintAll = () => this.runBulkExport();\n  }\n\n  componentDidMount(){\n    this.scheduleDrawCharts(0);\n    this.waitForData();\n  }\n  componentDidUpdate(){\n    this.scheduleDrawCharts(0);\n  }\n\n  setStateAsync(patch){\n    return new Promise(resolve => this.setState(patch, resolve));\n  }\n\n  async runBulkExport(){\n    const D = window.DASHBOARD_DATA;\n    if (!D || this.state.exporting) return;\n    const stores = D.stores.filter(s => s.key !== '__ALL__');\n    await this.setStateAsync({ exporting: true, exportTotal: stores.length, exportIndex: -1 });\n    for (let i = 0; i < stores.length; i++){\n      await this.setStateAsync({ exportIndex: i });\n      await new Promise(r => setTimeout(r, 120));\n      try {\n        await this.captureAndSaveCurrentExportPage(stores[i]);\n      } catch (e){ console.error('PDF export failed for', stores[i].name, e); }\n    }\n    await this.setStateAsync({ exporting: false, exportIndex: -1 });\n  }\n\n  async captureAndSaveCurrentExportPage(store){\n    const el = this.exportContainerRef.current && this.exportContainerRef.current.firstElementChild;\n    if (!el || !window.html2canvas || !window.jspdf) return;\n    const canvas = await window.html2canvas(el, { scale: 2, useCORS: true, backgroundColor: '#ffffff' });\n    const imgData = canvas.toDataURL('image/png');\n    const { jsPDF } = window.jspdf;\n    const doc = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });\n    const pageW = 210, pageH = 297;\n    const canvasRatio = canvas.height / canvas.width;\n    let drawW = pageW, drawH = pageW * canvasRatio;\n    if (drawH > pageH){ drawH = pageH; drawW = pageH / canvasRatio; }\n    const offsetX = (pageW - drawW) / 2;\n    doc.addImage(imgData, 'PNG', offsetX, 0, drawW, drawH);\n    const monthLabel = (this.state.month || (window.DASHBOARD_DATA.months||[]).slice(-1)[0] || '');\n    const safeName = store.name.replace(/[\\\\/:*?\"<>|]/g, '_');\n    doc.save(`${safeName}_${monthLabel}.pdf`);\n  }\n\n  waitForData(attempt){\n    attempt = attempt || 0;\n    if (window.DASHBOARD_DATA){ this.forceUpdate(); return; }\n    if (attempt > 100) return;\n    setTimeout(() => this.waitForData(attempt + 1), 100);\n  }\n\n  scheduleDrawCharts(attempt){\n    if (this._drawTimer) clearTimeout(this._drawTimer);\n    this._drawTimer = setTimeout(() => {\n      const ref = this.trendChartRef.current;\n      const ready = ref && ref.parentElement && ref.parentElement.clientHeight > 0 && ref.parentElement.clientWidth > 0;\n      if (!ready && attempt < 20){\n        this.scheduleDrawCharts(attempt + 1);\n        return;\n      }\n      this.drawCharts();\n      for (const key in this._charts){ this._charts[key].resize(); this._charts[key].update(); }\n    }, attempt === 0 ? 60 : 80);\n  }\n\n  destroyChart(key){ if(this._charts[key]){ this._charts[key].destroy(); delete this._charts[key]; } }\n\n  drawCharts(){\n    const D = window.DASHBOARD_DATA;\n    if (!D || !this._computed) return;\n    const c = this._computed;\n    const accent = this.props.accentColor || '#1F8A5B';\n    if (window.Chart && Chart.defaults) Chart.defaults.animation = false;\n\n    // trend (new registrations sparkline)\n    if (this.trendChartRef.current){\n      this.destroyChart('trend');\n      this._charts.trend = new Chart(this.trendChartRef.current.getContext('2d'), {\n        type: 'bar',\n        data: { labels: c.trend.labels, datasets: [{ data: c.trend.values, backgroundColor: accent, borderRadius: 3, maxBarThickness: 14 }] },\n        options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}, tooltip:{enabled:true}},\n          scales:{ x:{display:false}, y:{display:false} } }\n      });\n    }\n    // rank donut\n    if (this.rankChartRef.current){\n      this.destroyChart('rank');\n      this._charts.rank = new Chart(this.rankChartRef.current.getContext('2d'), {\n        type: 'doughnut',\n        data: { labels: c.rank.labels, datasets: [{ data: c.rank.values, backgroundColor: c.rank.colors, borderWidth: 0 }] },\n        options: { responsive:true, maintainAspectRatio:false, cutout:'62%', plugins:{ legend:{display:false} } }\n      });\n    }\n    // gender donut\n    if (this.genderChartRef.current){\n      this.destroyChart('gender');\n      this._charts.gender = new Chart(this.genderChartRef.current.getContext('2d'), {\n        type: 'doughnut',\n        data: { labels: ['男性','女性','不明'], datasets: [{ data: c.gender.values, backgroundColor: [accent, '#e08a9a', '#d8d5cd'], borderWidth: 0 }] },\n        options: { responsive:true, maintainAspectRatio:false, cutout:'60%', plugins:{ legend:{display:false} } }\n      });\n    }\n    // age bar\n    if (this.ageChartRef.current){\n      this.destroyChart('age');\n      this._charts.age = new Chart(this.ageChartRef.current.getContext('2d'), {\n        type: 'bar',\n        data: { labels: c.age.labels, datasets: [{ data: c.age.values, backgroundColor: accent, borderRadius: 4, maxBarThickness: 28 }] },\n        options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},\n          scales:{ x:{grid:{display:false}, ticks:{font:{size:11}}}, y:{grid:{color:'rgba(0,0,0,.05)'}, ticks:{font:{size:10}}} } }\n      });\n    }\n    // pref bar (horizontal)\n    if (this.prefChartRef.current){\n      this.destroyChart('pref');\n      this._charts.pref = new Chart(this.prefChartRef.current.getContext('2d'), {\n        type: 'bar',\n        data: { labels: c.pref.labels, datasets: [{ data: c.pref.values, backgroundColor: accent, borderRadius: 4, maxBarThickness: 16 }] },\n        options: { indexAxis:'y', responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},\n          scales:{ x:{grid:{color:'rgba(0,0,0,.05)'}, ticks:{font:{size:10}}}, y:{grid:{display:false}, ticks:{font:{size:11.5}}} } }\n      });\n    }\n    // dow bar\n    if (this.dowChartRef.current){\n      this.destroyChart('dow');\n      this._charts.dow = new Chart(this.dowChartRef.current.getContext('2d'), {\n        type: 'bar',\n        data: { labels: DOW_LABELS, datasets: [{ data: c.dow.values, backgroundColor: DOW_LABELS.map((_,i)=> (i===0||i===6) ? '#e08a9a' : accent), borderRadius: 4, maxBarThickness: 22 }] },\n        options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},\n          scales:{ x:{grid:{display:false}, ticks:{font:{size:11}}}, y:{grid:{color:'rgba(0,0,0,.05)'}, ticks:{font:{size:10}}} } }\n      });\n    }\n    // visitors vs customers\n    if (this.visitorsChartRef.current && c.visitorsSeries){\n      this.destroyChart('visitors');\n      this._charts.visitors = new Chart(this.visitorsChartRef.current.getContext('2d'), {\n        data: { labels: c.visitorsSeries.labels, datasets: [\n          { type:'bar', label:'来店会員数', data: c.visitorsSeries.visitors, backgroundColor: accent, yAxisID:'y', borderRadius:3, maxBarThickness:20 },\n          { type:'line', label:'客数実績（POS）', data: c.visitorsSeries.customers, borderColor:'#b08d57', backgroundColor:'#b08d57', yAxisID:'y1', tension:.3, pointRadius:2 }\n        ]},\n        options: { responsive:true, maintainAspectRatio:false,\n          plugins:{ legend:{display:true, labels:{font:{size:11}}} },\n          scales:{\n            x:{ ticks:{font:{size:10}} },\n            y:{ position:'left', grid:{color:'rgba(0,0,0,.05)'}, ticks:{font:{size:10}} },\n            y1:{ position:'right', grid:{display:false}, ticks:{font:{size:10}} }\n          } }\n      });\n    }\n  }\n\n  renderVals(){\n    const D = window.DASHBOARD_DATA;\n    if (!D){\n      return { dataReady:false, dataNotReady:true, printPages:[] };\n    }\n    const months = D.months;\n    const selMonth = this.state.month || months[months.length-1];\n    const selStore = this.state.store || '__ALL__';\n    const monthIdx = months.indexOf(selMonth);\n    const prevMonth = monthIdx>0 ? months[monthIdx-1] : null;\n    const storeData = D.data[selStore] || {};\n    const cur = storeData[selMonth];\n    const prev = prevMonth ? storeData[prevMonth] : null;\n    const storeObj = D.stores.find(s=>s.key===selStore) || D.stores[0];\n\n    const monthOptions = months.map(m => ({ value:m, label: m.replace('-','年')+'月' })).reverse();\n    const storeOptions = D.stores.map(s => ({ key:s.key, label: s.name + (s.key==='__ALL__'?'':`（${s.memberCount.toLocaleString('ja-JP')}人）`) }));\n\n    if (!cur){\n      return { dataReady:false, dataNotReady:true, printPages:[] };\n    }\n\n    const custThisMonth = cur.sales ? cur.sales.customers : null;\n    const memberRatio = custThisMonth ? (cur.cumulativeTotal / custThisMonth * 100) : null;\n    const activeRatio = custThisMonth ? (cur.active / custThisMonth * 100) : null;\n    const activeOfMember = cur.cumulativeTotal ? (cur.active / cur.cumulativeTotal * 100) : null;\n\n    const totalDelta = prev ? cur.cumulativeTotal - prev.cumulativeTotal : null;\n    const activeDelta = prev ? cur.active - prev.active : null;\n\n    const deltaColor = (d) => d==null ? 'rgba(0,0,0,.35)' : d > 0 ? '#1F8A5B' : d < 0 ? '#c0524a' : 'rgba(0,0,0,.4)';\n    const deltaArrow = (d) => d==null ? '' : d > 0 ? '▲' : d < 0 ? '▼' : '±';\n\n    const kpi = {\n      newRegFmt: fmtInt(cur.newReg),\n      totalMembersFmt: fmtInt(cur.cumulativeTotal),\n      totalMembersDeltaFmt: totalDelta==null ? '−' : fmtInt(Math.abs(totalDelta)),\n      totalMembersDeltaColor: deltaColor(totalDelta),\n      totalMembersDeltaArrow: deltaArrow(totalDelta),\n      memberRatioFmt: fmtPct(memberRatio),\n      activeFmt: fmtInt(cur.active),\n      activeDeltaFmt: activeDelta==null ? '−' : fmtInt(Math.abs(activeDelta)),\n      activeDeltaColor: deltaColor(activeDelta),\n      activeDeltaArrow: deltaArrow(activeDelta),\n      activeRatioFmt: fmtPct(activeRatio),\n      activeOfMemberFmt: fmtPct(activeOfMember),\n      hasSales: !!cur.sales,\n      hasSalesMissing: !cur.sales,\n      visitorsFmt: fmtInt(cur.visitors),\n      visitorsDeltaFmt: prev ? fmtInt(Math.abs(cur.visitors - prev.visitors)) : '−',\n      visitorsDeltaColor: deltaColor(prev ? cur.visitors - prev.visitors : null),\n      visitorsDeltaArrow: deltaArrow(prev ? cur.visitors - prev.visitors : null),\n      visitorsRatioFmt: custThisMonth ? fmtPct(cur.visitors/custThisMonth*100) : '−'\n    };\n\n    // rank rows\n    const rankKeys = ['bronze','silver','gold','platinum'];\n    const rankTotal = rankKeys.reduce((s,k)=>s+cur.rank[k],0) || 1;\n    const selectedRank = this.state.selectedRank;\n    const rankRows = rankKeys.map(k => {\n      const d = prev ? cur.rank[k]-prev.rank[k] : null;\n      const isSel = selectedRank === k;\n      return {\n        label: RANK_LABELS[k], color: RANK_COLORS[k],\n        countFmt: fmtInt(cur.rank[k]),\n        pctFmt: fmtPct(cur.rank[k]/rankTotal*100,0),\n        deltaFmt: d==null?'−':fmtInt(Math.abs(d)),\n        deltaColor: deltaColor(d), deltaArrow: deltaArrow(d),\n        onClick: this.onRankClick(k),\n        rowBg: isSel ? 'rgba(31,138,91,.1)' : 'transparent',\n        rowBorder: isSel ? (this.props.accentColor || '#1F8A5B') : 'transparent'\n      };\n    });\n    const rankFilterActive = !!selectedRank;\n    const rankFilterLabel = selectedRank ? `${RANK_LABELS[selectedRank]}会員（${fmtInt(cur.rank[selectedRank])}人）で絞り込み中` : '';\n\n    // demographic source: whole store, or the selected rank segment\n    const demoSource = selectedRank && cur.rankSegments ? cur.rankSegments[selectedRank] : cur;\n\n    // gender/age\n    const genderTotal = (demoSource.gender.male+demoSource.gender.female+demoSource.gender.unknown) || 1;\n    const demo = {\n      maleFmt: fmtInt(demoSource.gender.male), malePctFmt: fmtPct(demoSource.gender.male/genderTotal*100,0),\n      femaleFmt: fmtInt(demoSource.gender.female), femalePctFmt: fmtPct(demoSource.gender.female/genderTotal*100,0),\n      unknownFmt: fmtInt(demoSource.gender.unknown)\n    };\n\n    // residence: prefecture for 全店, city (市区町村) for a single store\n    const isAll = selStore === '__ALL__';\n    const geoDict = isAll ? demoSource.pref : (demoSource.city || demoSource.pref);\n    const geoEntries = Object.entries(geoDict).filter(([k])=>k!=='その他').sort((a,b)=>b[1]-a[1]);\n    const prefTop = geoEntries.slice(0,10);\n    const prefOrCityLabel = isAll ? '都道府県' : '市区町村';\n\n    // coupon ranking across all real stores (exclude __ALL__) for selMonth\n    const couponTotals = [];\n    let grandTotal = 0;\n    for (const s of D.stores){\n      if (s.key === '__ALL__') continue;\n      const md = D.data[s.key][selMonth];\n      const t = (md && md.coupon) ? md.coupon.total : 0;\n      couponTotals.push({ key:s.key, name:s.name, total:t });\n      grandTotal += t;\n    }\n    couponTotals.sort((a,b)=>b.total-a.total);\n    const couponRanking = couponTotals.filter(c=>c.total>0).map((c,i)=>({\n      rank: i+1, name: c.name,\n      countFmt: fmtInt(c.total),\n      pctFmt: grandTotal>0 ? fmtPct(c.total/grandTotal*100) : '−',\n      rowBg: c.key===selStore ? 'rgba(31,138,91,.08)' : (i%2? '#fafaf9':'#fff'),\n      weight: c.key===selStore ? 700 : 400\n    }));\n\n    const couponNameRows = (cur.coupon && cur.coupon.byName.length) ? cur.coupon.byName.map(n=>({ name:n.name, countFmt: fmtInt(n.count) })) : [];\n\n    // trend series: last 12 months ending at selMonth, newReg for selStore\n    const trendLabels = [];\n    const trendValues = [];\n    for (let i=11; i>=0; i--){\n      const idx = monthIdx - i;\n      if (idx < 0) { trendLabels.push(''); trendValues.push(0); continue; }\n      const m = months[idx];\n      const md = storeData[m];\n      trendLabels.push(m.slice(5));\n      trendValues.push(md ? md.newReg : 0);\n    }\n\n    // visitors vs customers series: trailing 12 months ending at selMonth\n    const vLabels = [], vVisitors = [], vCustomers = [];\n    for (let i=11; i>=0; i--){\n      const idx = monthIdx - i;\n      if (idx < 0){ vLabels.push(''); vVisitors.push(null); vCustomers.push(null); continue; }\n      const m = months[idx];\n      const md = storeData[m];\n      vLabels.push(m.slice(5));\n      vVisitors.push(md ? md.visitors : null);\n      vCustomers.push(md && md.sales ? md.sales.customers : null);\n    }\n    const visitorsSeries = { labels: vLabels, visitors: vVisitors, customers: vCustomers };\n\n    const exporting = !!this.state.exporting;\n    const exportIndex = this.state.exportIndex;\n    const exportTotal = this.state.exportTotal;\n    let printPages = [];\n    if (exporting && exportIndex >= 0){\n      const genDate = new Date().toLocaleDateString('ja-JP');\n      const currentStore = D.stores.filter(s => s.key !== '__ALL__')[exportIndex];\n      printPages = (currentStore ? [currentStore] : []).map(s => {\n        const md = D.data[s.key][selMonth];\n        const pmd = prevMonth ? D.data[s.key][prevMonth] : null;\n        const pDelta = (curVal, prevVal) => prevVal==null ? null : curVal - prevVal;\n        const fmtDelta = (d) => d==null ? '−' : fmtInt(Math.abs(d));\n\n        const rTotal = rankKeys.reduce((sum,k)=>sum+md.rank[k],0) || 1;\n        const rankRowsP = rankKeys.map(k => {\n          const d = pmd ? md.rank[k]-pmd.rank[k] : null;\n          return {\n            label: RANK_LABELS[k], color: RANK_COLORS[k],\n            countFmt: fmtInt(md.rank[k]),\n            barPct: +(md.rank[k]/rTotal*100).toFixed(1),\n            deltaFmt: fmtDelta(d), deltaColor: deltaColor(d), deltaArrow: deltaArrow(d)\n          };\n        });\n        const ageMax = Math.max(md.age.u20, md.age.y20, md.age.y30, md.age.y40, md.age.y50, md.age.y60, 1);\n        const ageRows = [\n          {label:'〜19', countFmt: fmtInt(md.age.u20), barPct: +(md.age.u20/ageMax*100).toFixed(1)},\n          {label:'20代', countFmt: fmtInt(md.age.y20), barPct: +(md.age.y20/ageMax*100).toFixed(1)},\n          {label:'30代', countFmt: fmtInt(md.age.y30), barPct: +(md.age.y30/ageMax*100).toFixed(1)},\n          {label:'40代', countFmt: fmtInt(md.age.y40), barPct: +(md.age.y40/ageMax*100).toFixed(1)},\n          {label:'50代', countFmt: fmtInt(md.age.y50), barPct: +(md.age.y50/ageMax*100).toFixed(1)},\n          {label:'60以上', countFmt: fmtInt(md.age.y60), barPct: +(md.age.y60/ageMax*100).toFixed(1)}\n        ];\n        const genderTotalP = (md.gender.male+md.gender.female+md.gender.unknown) || 1;\n        const geoDictP = s.key === '__ALL__' ? md.pref : (md.city || md.pref);\n        const geoTotalP = Object.values(geoDictP).reduce((a,b)=>a+b,0) || 1;\n        const geoRows = Object.entries(geoDictP).filter(([k])=>k!=='その他').sort((a,b)=>b[1]-a[1]).slice(0,5)\n          .map(([name,count]) => ({ name, countFmt: fmtInt(count), pctFmt: fmtPct(count/geoTotalP*100,0) }));\n        const couponTotalForPct = md.coupon ? md.coupon.total : 0;\n        const couponRows = (md.coupon && md.coupon.byName.length) ? md.coupon.byName.filter(n=>n.name!=='その他').slice(0,5).map(n=>({ name:n.name, countFmt: fmtInt(n.count), pctFmt: couponTotalForPct>0 ? fmtPct(n.count/couponTotalForPct*100,0) : '−' })) : [];\n\n        const newRegD = pDelta(md.newReg, pmd && pmd.newReg);\n        const totalD = pDelta(md.cumulativeTotal, pmd && pmd.cumulativeTotal);\n        const activeD = pDelta(md.active, pmd && pmd.active);\n        const visitorsD = pDelta(md.visitors, pmd && pmd.visitors);\n        const custThisMonthP = md.sales ? md.sales.customers : null;\n\n        return {\n          storeName: s.name, monthLabel: selMonth.replace('-','年')+'月', generatedDate: genDate,\n          newRegFmt: fmtInt(md.newReg), totalFmt: fmtInt(md.cumulativeTotal), activeFmt: fmtInt(md.active),\n          salesFmt: fmtInt(md.visitors),\n          newRegDeltaFmt: fmtDelta(newRegD), newRegDeltaColor: deltaColor(newRegD), newRegDeltaArrow: deltaArrow(newRegD),\n          totalDeltaFmt: fmtDelta(totalD), totalDeltaColor: deltaColor(totalD), totalDeltaArrow: deltaArrow(totalD),\n          activeDeltaFmt: fmtDelta(activeD), activeDeltaColor: deltaColor(activeD), activeDeltaArrow: deltaArrow(activeD),\n          visitorsDeltaFmt: fmtDelta(visitorsD), visitorsDeltaColor: deltaColor(visitorsD), visitorsDeltaArrow: deltaArrow(visitorsD),\n          visitorsRatioFmt: custThisMonthP ? fmtPct(md.visitors/custThisMonthP*100) : '−',\n          rankRows: rankRowsP, ageRows,\n          maleFmt: fmtInt(md.gender.male), femaleFmt: fmtInt(md.gender.female), unknownGenderFmt: fmtInt(md.gender.unknown),\n          malePctFmt: fmtPct(md.gender.male/genderTotalP*100,0), femalePctFmt: fmtPct(md.gender.female/genderTotalP*100,0), unknownGenderPctFmt: fmtPct(md.gender.unknown/genderTotalP*100,0),\n          geoRows,\n          couponTotalFmt: md.coupon ? fmtInt(md.coupon.total) : '0',\n          couponRows, couponEmpty: couponRows.length===0\n        };\n      });\n    }\n\n    this._computed = {\n      trend: { labels: trendLabels, values: trendValues },\n      rank: { labels: rankKeys.map(k=>RANK_LABELS[k]), values: rankKeys.map(k=>cur.rank[k]), colors: rankKeys.map(k=>RANK_COLORS[k]) },\n      gender: { values: [demoSource.gender.male, demoSource.gender.female, demoSource.gender.unknown] },\n      age: { labels: ['〜19','20代','30代','40代','50代','60以上'], values: [demoSource.age.u20, demoSource.age.y20, demoSource.age.y30, demoSource.age.y40, demoSource.age.y50, demoSource.age.y60] },\n      pref: { labels: prefTop.map(p=>p[0]), values: prefTop.map(p=>p[1]) },\n      dow: { values: cur.coupon ? cur.coupon.byDow : [0,0,0,0,0,0,0] },\n      visitorsSeries\n    };\n\n    const exportBtnLabel = exporting ? `出力中... ${exportIndex+1}/${exportTotal}` : '全店舗レポート PDF出力（1店舗1ファイル）';\n\n    return {\n      dataReady: true, dataNotReady: false,\n      printPages, exporting, exportBtnLabel, exportBtnOpacity: exporting ? 0.6 : 1,\n      onPrintAll: this.onPrintAll, exportContainerRef: this.exportContainerRef,\n      selMonth, selMonthLabel: selMonth.replace('-','年')+'月',\n      selStore, selStoreLabel: storeObj.name,\n      monthOptions, storeOptions,\n      onMonthChange: this.onMonthChange, onStoreChange: this.onStoreChange,\n      kpi, rankRows, demo,\n      rankFilterActive, rankFilterLabel, onClearRankFilter: this.onClearRankFilter,\n      couponRanking, couponNameRows, couponNameEmpty: couponNameRows.length===0,\n      prefOrCityLabel,\n      showSalesReference: this.props.showSalesReference ?? true,\n      trendChartRef: this.trendChartRef, rankChartRef: this.rankChartRef,\n      genderChartRef: this.genderChartRef, ageChartRef: this.ageChartRef,\n      prefChartRef: this.prefChartRef, dowChartRef: this.dowChartRef, visitorsChartRef: this.visitorsChartRef,\n      accentColor: this.props.accentColor || '#1F8A5B'\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
