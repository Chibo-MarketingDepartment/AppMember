document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"86aa03a7-6303-4602-a942-41a47f17598d\"><\u002Fscript>\n\n<\u002Fhead>\n<body>\n<x-dc>\n\n<helmet data-dc-atomics=\"\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n  <style>\n    body{margin:0;background:#f7f7f5}\n    ::-webkit-scrollbar{width:8px;height:8px}\n    ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:4px}\n    a{color:{{ accentColor }};text-decoration:none}\n    a:hover{color:{{ accentColor }};text-decoration:underline}\n    select{font:inherit}\n  <\u002Fstyle>\n  <script src=\"19845c0c-5daf-4236-a8ee-679854d64aec\"><\u002Fscript>\n  <script src=\"ec0572aa-1008-4d9c-a908-304828d9a7c5\"><\u002Fscript>\n<\u002Fhelmet>\n\n<div style=\"font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;color:#1c1c1a;min-height:100vh;background:#f7f7f5;padding-bottom:48px\">\n\n  <sc-if value=\"{{ dataReady }}\" hint-placeholder-val=\"{{ false }}\">\n\n  <!-- Header + Filter bar -->\n  <div style=\"position:sticky;top:0;z-index:20;background:#ffffff;borderBottom:1px solid rgba(0,0,0,.08);box-shadow:0 1px 0 rgba(0,0,0,.04)\">\n    <div style=\"max-width:1320px;margin:0 auto;padding:16px 20px;display:flex;flex-wrap:wrap;align-items:center;gap:16px 24px\">\n      <div style=\"display:flex;flex-direction:column;gap:2px;margin-right:auto\">\n        <div style=\"font-size:19px;font-weight:700;letter-spacing:.01em\">会員データダッシュボード<\u002Fdiv>\n        <div style=\"font-size:12.5px;color:rgba(0,0,0,.45)\">アプリ会員 月次レポート ・ データ更新: 2026/07/07<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-wrap:wrap;gap:10px 18px;align-items:center\">\n        <label style=\"display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(0,0,0,.6)\">\n          対象期間\n          <select value=\"{{ selMonth }}\" onchange=\"{{ onMonthChange }}\" style=\"padding:8px 12px;border-radius:8px;border:1px solid rgba(0,0,0,.15);background:#fff;font-size:14px;font-weight:600;color:#1c1c1a;min-width:130px\">\n            <sc-for list=\"{{ monthOptions }}\" as=\"m\" hint-placeholder-count=\"3\">\n              <option value=\"{{ m.value }}\">{{ m.label }}<\u002Foption>\n            <\u002Fsc-for>\n          <\u002Fselect>\n        <\u002Flabel>\n        <label style=\"display:flex;align-items:center;gap:8px;font-size:13px;color:rgba(0,0,0,.6)\">\n          店舗\n          <select value=\"{{ selStore }}\" onchange=\"{{ onStoreChange }}\" style=\"padding:8px 12px;border-radius:8px;border:1px solid rgba(0,0,0,.15);background:#fff;font-size:14px;font-weight:600;color:#1c1c1a;min-width:180px;max-width:260px\">\n            <sc-for list=\"{{ storeOptions }}\" as=\"s\" hint-placeholder-count=\"3\">\n              <option value=\"{{ s.key }}\">{{ s.label }}<\u002Foption>\n            <\u002Fsc-for>\n          <\u002Fselect>\n        <\u002Flabel>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"max-width:1320px;margin:0 auto;padding:24px 20px 0\">\n\n    <!-- KPI cards -->\n    <div style=\"display:grid;gridTemplateColumns:repeat(auto-fit, minmax(240px, 1fr));gap:16px;margin-bottom:20px\">\n\n      <!-- 新規会員登録数 -->\n      <div style=\"background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:14px;padding:18px 20px;display:flex;flex-direction:column;gap:10px\">\n        <div style=\"font-size:12.5px;color:rgba(0,0,0,.5);font-weight:600\">新規会員登録数（{{ selMonthLabel }}）<\u002Fdiv>\n        <div style=\"display:flex;align-items:baseline;gap:8px\">\n          <div style=\"font-size:30px;font-weight:800;letter-spacing:-.01em\">{{ kpi.newRegFmt }}<\u002Fdiv>\n          <div style=\"font-size:12.5px;color:rgba(0,0,0,.4)\">人<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"height:56px\">\n          <canvas ref=\"{{ trendChartRef }}\"><\u002Fcanvas>\n        <\u002Fdiv>\n        <div style=\"font-size:11.5px;color:rgba(0,0,0,.4)\">直近12カ月推移<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 総会員数 -->\n      <div style=\"background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:14px;padding:18px 20px;display:flex;flex-direction:column;gap:8px\">\n        <div style=\"font-size:12.5px;color:rgba(0,0,0,.5);font-weight:600\">総会員数（累計・{{ selMonthLabel }}時点）<\u002Fdiv>\n        <div style=\"display:flex;align-items:baseline;gap:8px\">\n          <div style=\"font-size:30px;font-weight:800;letter-spacing:-.01em\">{{ kpi.totalMembersFmt }}<\u002Fdiv>\n          <div style=\"font-size:12.5px;color:rgba(0,0,0,.4)\">人<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:{{ kpi.totalMembersDeltaColor }}\">\n          <span>{{ kpi.totalMembersDeltaArrow }}<\u002Fspan><span>{{ kpi.totalMembersDeltaFmt }}<\u002Fspan>\n          <span style=\"font-weight:400;color:rgba(0,0,0,.4)\">先月比<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"margin-top:4px;padding-top:10px;borderTop:1px dashed rgba(0,0,0,.1);font-size:12.5px;color:rgba(0,0,0,.55)\">\n          対客数比（当月）　<b style=\"color:#1c1c1a;font-size:14px\">{{ kpi.memberRatioFmt }}<\u002Fb>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- アクティブ会員数 -->\n      <div style=\"background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:14px;padding:18px 20px;display:flex;flex-direction:column;gap:8px\">\n        <div style=\"font-size:12.5px;color:rgba(0,0,0,.5);font-weight:600\">アクティブ会員数（直近3カ月来店）<\u002Fdiv>\n        <div style=\"display:flex;align-items:baseline;gap:8px\">\n          <div style=\"font-size:30px;font-weight:800;letter-spacing:-.01em\">{{ kpi.activeFmt }}<\u002Fdiv>\n          <div style=\"font-size:12.5px;color:rgba(0,0,0,.4)\">人<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:{{ kpi.activeDeltaColor }}\">\n          <span>{{ kpi.activeDeltaArrow }}<\u002Fspan><span>{{ kpi.activeDeltaFmt }}<\u002Fspan>\n          <span style=\"font-weight:400;color:rgba(0,0,0,.4)\">先月比<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"margin-top:4px;padding-top:10px;borderTop:1px dashed rgba(0,0,0,.1);font-size:12.5px;color:rgba(0,0,0,.55)\">\n          対客数比（当月）　<b style=\"color:#1c1c1a;font-size:14px\">{{ kpi.activeRatioFmt }}<\u002Fb>　・　会員比 <b style=\"color:#1c1c1a;font-size:14px\">{{ kpi.activeOfMemberFmt }}<\u002Fb>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 参考: 売上/客単価 -->\n      <div style=\"background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:14px;padding:18px 20px;display:flex;flex-direction:column;gap:8px\">\n        <div style=\"font-size:12.5px;color:rgba(0,0,0,.5);font-weight:600\">当月売上・客単価（参考）<\u002Fdiv>\n        <sc-if value=\"{{ kpi.hasSales }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex;align-items:baseline;gap:8px\">\n            <div style=\"font-size:26px;font-weight:800;letter-spacing:-.01em\">{{ kpi.salesFmt }}<\u002Fdiv>\n            <div style=\"font-size:12.5px;color:rgba(0,0,0,.4)\">円<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:13px;color:rgba(0,0,0,.6)\">客単価　<b style=\"color:#1c1c1a\">{{ kpi.unitPriceFmt }}<\u002Fb>円　・　客数　<b style=\"color:#1c1c1a\">{{ kpi.customersFmt }}<\u002Fb>人<\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ kpi.hasSalesMissing }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"font-size:13px;color:rgba(0,0,0,.35);padding:10px 0\">この店舗の売上データはありません<\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ランク分布 + 性別年代 + 居住地 -->\n    <div style=\"display:grid;gridTemplateColumns:repeat(auto-fit, minmax(320px, 1fr));gap:16px;margin-bottom:20px\">\n\n      <!-- ランク分布 -->\n      <div style=\"background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:14px;padding:20px\">\n        <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px\">\n          <div style=\"font-size:14px;font-weight:700\">ランク分布（直近12カ月の来店回数）<\u002Fdiv>\n          <div style=\"font-size:11.5px;color:rgba(0,0,0,.4)\">0回=ブロンズ / 1〜3=シルバー / 4〜6=ゴールド / 7回以上=プラチナ<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:20px;align-items:center\">\n          <div style=\"width:150px;height:150px;flex:none\"><canvas ref=\"{{ rankChartRef }}\"><\u002Fcanvas><\u002Fdiv>\n          <div style=\"flex:1;display:flex;flex-direction:column;gap:8px\">\n            <sc-for list=\"{{ rankRows }}\" as=\"r\" hint-placeholder-count=\"4\">\n              <div style=\"display:flex;align-items:center;gap:8px;font-size:13px\">\n                <div style=\"width:10px;height:10px;border-radius:3px;background:{{ r.color }};flex:none\"><\u002Fdiv>\n                <div style=\"width:64px;color:rgba(0,0,0,.6)\">{{ r.label }}<\u002Fdiv>\n                <div style=\"width:56px;font-weight:700\">{{ r.countFmt }}人<\u002Fdiv>\n                <div style=\"width:48px;color:rgba(0,0,0,.4)\">{{ r.pctFmt }}<\u002Fdiv>\n                <div style=\"font-size:11.5px;font-weight:700;color:{{ r.deltaColor }}\">{{ r.deltaArrow }}{{ r.deltaFmt }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 性別＆年代 -->\n      <div style=\"background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:14px;padding:20px\">\n        <div style=\"font-size:14px;font-weight:700;margin-bottom:12px\">性別 ／ 年代 人口動態（累計会員）<\u002Fdiv>\n        <div style=\"display:flex;gap:20px;align-items:center;margin-bottom:14px\">\n          <div style=\"width:100px;height:100px;flex:none\"><canvas ref=\"{{ genderChartRef }}\"><\u002Fcanvas><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:6px;font-size:13px\">\n            <div style=\"display:flex;align-items:center;gap:8px\"><div style=\"width:10px;height:10px;border-radius:3px;background:{{ accentColor }}\"><\u002Fdiv>男性 {{ demo.maleFmt }}（{{ demo.malePctFmt }}）<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px\"><div style=\"width:10px;height:10px;border-radius:3px;background:#e08a9a\"><\u002Fdiv>女性 {{ demo.femaleFmt }}（{{ demo.femalePctFmt }}）<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px\"><div style=\"width:10px;height:10px;border-radius:3px;background:#d8d5cd\"><\u002Fdiv>不明 {{ demo.unknownFmt }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"height:150px\"><canvas ref=\"{{ ageChartRef }}\"><\u002Fcanvas><\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- 居住地分布 -->\n      <div style=\"background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:14px;padding:20px\">\n        <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px\">\n          <div style=\"font-size:14px;font-weight:700\">居住地分布（{{ prefOrCityLabel }}・上位10）<\u002Fdiv>\n          <div style=\"font-size:11px;color:rgba(0,0,0,.35)\">郵便番号から住所を近似<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"height:260px\"><canvas ref=\"{{ prefChartRef }}\"><\u002Fcanvas><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- クーポン -->\n    <div style=\"display:grid;gridTemplateColumns:minmax(320px,1.3fr) minmax(280px,1fr);gap:16px;margin-bottom:20px\">\n      <div style=\"background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:14px;padding:20px\">\n        <div style=\"font-size:14px;font-weight:700;margin-bottom:4px\">クーポン回収 店舗別ランキング（{{ selMonthLabel }}）<\u002Fdiv>\n        <div style=\"font-size:11.5px;color:rgba(0,0,0,.4);margin-bottom:12px\">利用件数の構成比 ・ 全アプリ導入店舗中<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:2px;max-height:360px;overflow:auto\">\n          <div style=\"display:flex;font-size:11.5px;color:rgba(0,0,0,.4);padding:4px 8px;position:sticky;top:0;background:#fff\">\n            <div style=\"width:32px\">順位<\u002Fdiv><div style=\"flex:1\">店舗名<\u002Fdiv><div style=\"width:70px;text-align:right\">利用数<\u002Fdiv><div style=\"width:70px;text-align:right\">構成比<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-for list=\"{{ couponRanking }}\" as=\"c\" hint-placeholder-count=\"6\">\n            <div style=\"display:flex;align-items:center;padding:8px;border-radius:8px;font-size:13px;background:{{ c.rowBg }}\">\n              <div style=\"width:32px;color:rgba(0,0,0,.4)\">{{ c.rank }}<\u002Fdiv>\n              <div style=\"flex:1;font-weight:{{ c.weight }};overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-right:8px\">{{ c.name }}<\u002Fdiv>\n              <div style=\"width:70px;text-align:right;font-weight:700\">{{ c.countFmt }}<\u002Fdiv>\n              <div style=\"width:70px;text-align:right;color:rgba(0,0,0,.5)\">{{ c.pctFmt }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:16px\">\n        <div>\n          <div style=\"font-size:14px;font-weight:700;margin-bottom:8px\">曜日別クーポン利用（{{ selStoreLabel }}）<\u002Fdiv>\n          <div style=\"height:120px\"><canvas ref=\"{{ dowChartRef }}\"><\u002Fcanvas><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"border-top:1px solid rgba(0,0,0,.06);padding-top:14px\">\n          <div style=\"font-size:14px;font-weight:700;margin-bottom:8px\">利用クーポン内訳（{{ selStoreLabel }}）<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:6px;max-height:150px;overflow:auto\">\n            <sc-for list=\"{{ couponNameRows }}\" as=\"n\" hint-placeholder-count=\"5\">\n              <div style=\"display:flex;align-items:center;gap:8px;font-size:12.5px\">\n                <div style=\"flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:rgba(0,0,0,.65)\">{{ n.name }}<\u002Fdiv>\n                <div style=\"font-weight:700\">{{ n.countFmt }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n            <sc-if value=\"{{ couponNameEmpty }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"font-size:12.5px;color:rgba(0,0,0,.35);padding:8px 0\">この期間・店舗の利用データはありません<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 売上参考セクション -->\n    <sc-if value=\"{{ showSalesReference }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:14px;padding:20px;margin-bottom:20px\">\n      <div style=\"display:flex;flex-direction:column;gap:2px;margin-bottom:8px\">\n        <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:12px\">\n          <div style=\"font-size:14px;font-weight:700\">売上・客単価の推移（参考）<\u002Fdiv>\n          <div style=\"font-size:11px;color:rgba(0,0,0,.4);white-space:nowrap;flex:none\">全15カ月<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:12px;color:rgba(0,0,0,.45)\">{{ selStoreLabel }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:11.5px;color:rgba(0,0,0,.4);margin-bottom:12px\">会員個人ごとの購入金額データは提供元にないため、店舗全体の売上・客単価を参考指標として表示しています<\u002Fdiv>\n      <sc-if value=\"{{ kpi.hasSales }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"height:220px\"><canvas ref=\"{{ salesChartRef }}\"><\u002Fcanvas><\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ kpi.hasSalesMissing }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"font-size:13px;color:rgba(0,0,0,.35);padding:20px 0;text-align:center\">この店舗の売上データはありません<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- Methodology footer -->\n    <details style=\"background:#fff;border:1px solid rgba(0,0,0,.07);border-radius:14px;padding:16px 20px;margin-bottom:32px;font-size:12.5px;color:rgba(0,0,0,.55);line-height:1.8\">\n      <summary style=\"cursor:pointer;font-weight:700;color:#1c1c1a\">データ・集計方法について<\u002Fsummary>\n      <div style=\"margin-top:8px\">\n        ・集計対象は「会員登録状況」「来店スタンプ」「クーポン利用」「月別売上実績」の提供データ（2025/04〜2026/06、対象月フィルタ）。<br>\n        ・店舗は「店舗マスタ（shop_data）」記載の27アプリ実施店舗のみを対象。会員データとは店舗IDで突合。ヨドバシHD池袋ビル支店→リンクス池袋支店、堺高島屋支店→堺東支店は店舗IDが同一のため自動的に統合されています。<br>\n        ・総会員数は各店舗の累計登録者数（登録月が対象月以前の会員）。アクティブ会員数は対象月を含む直近3カ月以内に来店スタンプが1回以上ある会員数（来店店舗は問わず、会員IDベース）。<br>\n        ・「対客数比」の分母は当月の店舗売上データの客数実績（複数月の累計会員数と単月客数の比較のため、あくまで参考値）。<br>\n        ・ランク分布は対象月を含む直近12カ月の来店回数（0回=ブロンズ、1〜3回=シルバー、4〜6回=ゴールド、7回以上=プラチナ）。<br>\n        ・居住地分布は日本郵便の郵便番号データ（KEN_ALL）による住所近似。全店選択時は都道府県、個店選択時は市区町村で表示（郵便番号が対応表にない場合は「不明」）。<br>\n        ・売上・客単価は店舗単位の参考指標で、会員個人の購入額とは対応していません。\n      <\u002Fdiv>\n    <\u002Fdetails>\n  <\u002Fdiv>\n\n  <\u002Fsc-if>\n  <sc-if value=\"{{ dataNotReady }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"display:flex;align-items:center;justify-content:center;height:60vh;color:rgba(0,0,0,.4);font-size:14px\">データを読み込み中...<\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1400,&quot;height&quot;:1600},&quot;accentColor&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#1F8A5B&quot;,&quot;options&quot;:[&quot;#1F8A5B&quot;,&quot;#2A6FDB&quot;,&quot;#D97757&quot;,&quot;#7C5CBF&quot;,&quot;#0F172A&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;showSalesReference&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\n\nconst RANK_COLORS = { bronze:'#b08d57', silver:'#9aa0a6', gold:'#d4a72c', platinum:'#5b6b8c' };\nconst RANK_LABELS = { bronze:'ブロンズ', silver:'シルバー', gold:'ゴールド', platinum:'プラチナ' };\nconst DOW_LABELS = ['日','月','火','水','木','金','土'];\n\nfunction fmtInt(n){ return (n==null || isNaN(n)) ? '−' : Math.round(n).toLocaleString('ja-JP'); }\nfunction fmtPct(n, digits){ return (n==null || isNaN(n)) ? '−' : n.toFixed(digits==null?1:digits) + '%'; }\nfunction fmtYen(n){ return (n==null || isNaN(n)) ? '−' : Math.round(n).toLocaleString('ja-JP'); }\n\nclass Component extends DCLogic {\n  state = { month: null, store: '__ALL__' };\n\n  constructor(props){\n    super(props);\n    this.trendChartRef = React.createRef();\n    this.rankChartRef = React.createRef();\n    this.genderChartRef = React.createRef();\n    this.ageChartRef = React.createRef();\n    this.prefChartRef = React.createRef();\n    this.dowChartRef = React.createRef();\n    this.salesChartRef = React.createRef();\n    this._charts = {};\n    this.onMonthChange = (e) => this.setState({ month: e.target.value });\n    this.onStoreChange = (e) => this.setState({ store: e.target.value });\n  }\n\n  componentDidMount(){ this.scheduleDrawCharts(0); }\n  componentDidUpdate(){ this.scheduleDrawCharts(0); }\n\n  scheduleDrawCharts(attempt){\n    if (this._drawTimer) clearTimeout(this._drawTimer);\n    this._drawTimer = setTimeout(() => {\n      const ref = this.trendChartRef.current;\n      const ready = ref && ref.parentElement && ref.parentElement.clientHeight > 0 && ref.parentElement.clientWidth > 0;\n      if (!ready && attempt < 20){\n        this.scheduleDrawCharts(attempt + 1);\n        return;\n      }\n      this.drawCharts();\n      for (const key in this._charts){ this._charts[key].resize(); this._charts[key].update(); }\n    }, attempt === 0 ? 60 : 80);\n  }\n\n  destroyChart(key){ if(this._charts[key]){ this._charts[key].destroy(); delete this._charts[key]; } }\n\n  drawCharts(){\n    const D = window.DASHBOARD_DATA;\n    if (!D || !this._computed) return;\n    const c = this._computed;\n    const accent = this.props.accentColor || '#1F8A5B';\n    if (window.Chart && Chart.defaults) Chart.defaults.animation = false;\n\n    // trend (new registrations sparkline)\n    if (this.trendChartRef.current){\n      this.destroyChart('trend');\n      this._charts.trend = new Chart(this.trendChartRef.current.getContext('2d'), {\n        type: 'bar',\n        data: { labels: c.trend.labels, datasets: [{ data: c.trend.values, backgroundColor: accent, borderRadius: 3, maxBarThickness: 14 }] },\n        options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}, tooltip:{enabled:true}},\n          scales:{ x:{display:false}, y:{display:false} } }\n      });\n    }\n    // rank donut\n    if (this.rankChartRef.current){\n      this.destroyChart('rank');\n      this._charts.rank = new Chart(this.rankChartRef.current.getContext('2d'), {\n        type: 'doughnut',\n        data: { labels: c.rank.labels, datasets: [{ data: c.rank.values, backgroundColor: c.rank.colors, borderWidth: 0 }] },\n        options: { responsive:true, maintainAspectRatio:false, cutout:'62%', plugins:{ legend:{display:false} } }\n      });\n    }\n    // gender donut\n    if (this.genderChartRef.current){\n      this.destroyChart('gender');\n      this._charts.gender = new Chart(this.genderChartRef.current.getContext('2d'), {\n        type: 'doughnut',\n        data: { labels: ['男性','女性','不明'], datasets: [{ data: c.gender.values, backgroundColor: [accent, '#e08a9a', '#d8d5cd'], borderWidth: 0 }] },\n        options: { responsive:true, maintainAspectRatio:false, cutout:'60%', plugins:{ legend:{display:false} } }\n      });\n    }\n    // age bar\n    if (this.ageChartRef.current){\n      this.destroyChart('age');\n      this._charts.age = new Chart(this.ageChartRef.current.getContext('2d'), {\n        type: 'bar',\n        data: { labels: c.age.labels, datasets: [{ data: c.age.values, backgroundColor: accent, borderRadius: 4, maxBarThickness: 28 }] },\n        options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},\n          scales:{ x:{grid:{display:false}, ticks:{font:{size:11}}}, y:{grid:{color:'rgba(0,0,0,.05)'}, ticks:{font:{size:10}}} } }\n      });\n    }\n    // pref bar (horizontal)\n    if (this.prefChartRef.current){\n      this.destroyChart('pref');\n      this._charts.pref = new Chart(this.prefChartRef.current.getContext('2d'), {\n        type: 'bar',\n        data: { labels: c.pref.labels, datasets: [{ data: c.pref.values, backgroundColor: accent, borderRadius: 4, maxBarThickness: 16 }] },\n        options: { indexAxis:'y', responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},\n          scales:{ x:{grid:{color:'rgba(0,0,0,.05)'}, ticks:{font:{size:10}}}, y:{grid:{display:false}, ticks:{font:{size:11.5}}} } }\n      });\n    }\n    // dow bar\n    if (this.dowChartRef.current){\n      this.destroyChart('dow');\n      this._charts.dow = new Chart(this.dowChartRef.current.getContext('2d'), {\n        type: 'bar',\n        data: { labels: DOW_LABELS, datasets: [{ data: c.dow.values, backgroundColor: DOW_LABELS.map((_,i)=> (i===0||i===6) ? '#e08a9a' : accent), borderRadius: 4, maxBarThickness: 22 }] },\n        options: { responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}},\n          scales:{ x:{grid:{display:false}, ticks:{font:{size:11}}}, y:{grid:{color:'rgba(0,0,0,.05)'}, ticks:{font:{size:10}}} } }\n      });\n    }\n    // sales line\n    if (this.salesChartRef.current && c.sales){\n      this.destroyChart('sales');\n      this._charts.sales = new Chart(this.salesChartRef.current.getContext('2d'), {\n        type: 'line',\n        data: { labels: c.sales.labels, datasets: [\n          { label:'売上', data: c.sales.sales, borderColor: accent, backgroundColor: accent, yAxisID:'y', tension:.3, pointRadius:2 },\n          { label:'客単価', data: c.sales.unitPrice, borderColor:'#b08d57', backgroundColor:'#b08d57', yAxisID:'y1', tension:.3, pointRadius:2 }\n        ]},\n        options: { responsive:true, maintainAspectRatio:false,\n          plugins:{ legend:{display:true, labels:{font:{size:11}}} },\n          scales:{\n            x:{ ticks:{font:{size:10}} },\n            y:{ position:'left', grid:{color:'rgba(0,0,0,.05)'}, ticks:{font:{size:10}, callback:(v)=>(v/10000).toFixed(0)+'万'} },\n            y1:{ position:'right', grid:{display:false}, ticks:{font:{size:10}} }\n          } }\n      });\n    }\n  }\n\n  renderVals(){\n    const D = window.DASHBOARD_DATA;\n    if (!D){\n      return { dataReady:false, dataNotReady:true };\n    }\n    const months = D.months;\n    const selMonth = this.state.month || months[months.length-1];\n    const selStore = this.state.store || '__ALL__';\n    const monthIdx = months.indexOf(selMonth);\n    const prevMonth = monthIdx>0 ? months[monthIdx-1] : null;\n    const storeData = D.data[selStore] || {};\n    const cur = storeData[selMonth];\n    const prev = prevMonth ? storeData[prevMonth] : null;\n    const storeObj = D.stores.find(s=>s.key===selStore) || D.stores[0];\n\n    const monthOptions = months.map(m => ({ value:m, label: m.replace('-','年')+'月' })).reverse();\n    const storeOptions = D.stores.map(s => ({ key:s.key, label: s.name + (s.key==='__ALL__'?'':`（${s.memberCount.toLocaleString('ja-JP')}人）`) }));\n\n    if (!cur){\n      return { dataReady:false, dataNotReady:true };\n    }\n\n    const custThisMonth = cur.sales ? cur.sales.customers : null;\n    const memberRatio = custThisMonth ? (cur.cumulativeTotal / custThisMonth * 100) : null;\n    const activeRatio = custThisMonth ? (cur.active / custThisMonth * 100) : null;\n    const activeOfMember = cur.cumulativeTotal ? (cur.active / cur.cumulativeTotal * 100) : null;\n\n    const totalDelta = prev ? cur.cumulativeTotal - prev.cumulativeTotal : null;\n    const activeDelta = prev ? cur.active - prev.active : null;\n\n    const deltaColor = (d) => d==null ? 'rgba(0,0,0,.35)' : d > 0 ? '#1F8A5B' : d < 0 ? '#c0524a' : 'rgba(0,0,0,.4)';\n    const deltaArrow = (d) => d==null ? '' : d > 0 ? '▲' : d < 0 ? '▼' : '±';\n\n    const kpi = {\n      newRegFmt: fmtInt(cur.newReg),\n      totalMembersFmt: fmtInt(cur.cumulativeTotal),\n      totalMembersDeltaFmt: totalDelta==null ? '−' : fmtInt(Math.abs(totalDelta)),\n      totalMembersDeltaColor: deltaColor(totalDelta),\n      totalMembersDeltaArrow: deltaArrow(totalDelta),\n      memberRatioFmt: fmtPct(memberRatio),\n      activeFmt: fmtInt(cur.active),\n      activeDeltaFmt: activeDelta==null ? '−' : fmtInt(Math.abs(activeDelta)),\n      activeDeltaColor: deltaColor(activeDelta),\n      activeDeltaArrow: deltaArrow(activeDelta),\n      activeRatioFmt: fmtPct(activeRatio),\n      activeOfMemberFmt: fmtPct(activeOfMember),\n      hasSales: !!cur.sales,\n      hasSalesMissing: !cur.sales,\n      salesFmt: cur.sales ? fmtYen(cur.sales.sales) : '−',\n      unitPriceFmt: cur.sales ? fmtYen(cur.sales.unitPrice) : '−',\n      customersFmt: cur.sales ? fmtInt(cur.sales.customers) : '−'\n    };\n\n    // rank rows\n    const rankKeys = ['bronze','silver','gold','platinum'];\n    const rankTotal = rankKeys.reduce((s,k)=>s+cur.rank[k],0) || 1;\n    const rankRows = rankKeys.map(k => {\n      const d = prev ? cur.rank[k]-prev.rank[k] : null;\n      return {\n        label: RANK_LABELS[k], color: RANK_COLORS[k],\n        countFmt: fmtInt(cur.rank[k]),\n        pctFmt: fmtPct(cur.rank[k]/rankTotal*100,0),\n        deltaFmt: d==null?'−':fmtInt(Math.abs(d)),\n        deltaColor: deltaColor(d), deltaArrow: deltaArrow(d)\n      };\n    });\n\n    // gender/age\n    const genderTotal = (cur.gender.male+cur.gender.female+cur.gender.unknown) || 1;\n    const demo = {\n      maleFmt: fmtInt(cur.gender.male), malePctFmt: fmtPct(cur.gender.male/genderTotal*100,0),\n      femaleFmt: fmtInt(cur.gender.female), femalePctFmt: fmtPct(cur.gender.female/genderTotal*100,0),\n      unknownFmt: fmtInt(cur.gender.unknown)\n    };\n\n    // residence: prefecture for 全店, city (市区町村) for a single store\n    const isAll = selStore === '__ALL__';\n    const geoDict = isAll ? cur.pref : (cur.city || cur.pref);\n    const geoEntries = Object.entries(geoDict).filter(([k])=>k!=='その他').sort((a,b)=>b[1]-a[1]);\n    const prefTop = geoEntries.slice(0,10);\n    const prefOrCityLabel = isAll ? '都道府県' : '市区町村';\n\n    // coupon ranking across all real stores (exclude __ALL__) for selMonth\n    const couponTotals = [];\n    let grandTotal = 0;\n    for (const s of D.stores){\n      if (s.key === '__ALL__') continue;\n      const md = D.data[s.key][selMonth];\n      const t = (md && md.coupon) ? md.coupon.total : 0;\n      couponTotals.push({ key:s.key, name:s.name, total:t });\n      grandTotal += t;\n    }\n    couponTotals.sort((a,b)=>b.total-a.total);\n    const couponRanking = couponTotals.filter(c=>c.total>0).map((c,i)=>({\n      rank: i+1, name: c.name,\n      countFmt: fmtInt(c.total),\n      pctFmt: grandTotal>0 ? fmtPct(c.total/grandTotal*100) : '−',\n      rowBg: c.key===selStore ? 'rgba(31,138,91,.08)' : (i%2? '#fafaf9':'#fff'),\n      weight: c.key===selStore ? 700 : 400\n    }));\n\n    const couponNameRows = (cur.coupon && cur.coupon.byName.length) ? cur.coupon.byName.map(n=>({ name:n.name, countFmt: fmtInt(n.count) })) : [];\n\n    // trend series: last 12 months ending at selMonth, newReg for selStore\n    const trendLabels = [];\n    const trendValues = [];\n    for (let i=11; i>=0; i--){\n      const idx = monthIdx - i;\n      if (idx < 0) { trendLabels.push(''); trendValues.push(0); continue; }\n      const m = months[idx];\n      const md = storeData[m];\n      trendLabels.push(m.slice(5));\n      trendValues.push(md ? md.newReg : 0);\n    }\n\n    // sales series across all 15 months for selStore\n    let salesSeries = null;\n    if (cur.sales || months.some(m => storeData[m] && storeData[m].sales)){\n      const labels=[], salesArr=[], upArr=[];\n      for (const m of months){\n        const md = storeData[m];\n        labels.push(m.slice(5));\n        salesArr.push(md && md.sales ? md.sales.sales : null);\n        upArr.push(md && md.sales ? md.sales.unitPrice : null);\n      }\n      salesSeries = { labels, sales: salesArr, unitPrice: upArr };\n    }\n\n    this._computed = {\n      trend: { labels: trendLabels, values: trendValues },\n      rank: { labels: rankKeys.map(k=>RANK_LABELS[k]), values: rankKeys.map(k=>cur.rank[k]), colors: rankKeys.map(k=>RANK_COLORS[k]) },\n      gender: { values: [cur.gender.male, cur.gender.female, cur.gender.unknown] },\n      age: { labels: ['〜19','20代','30代','40代','50代','60以上'], values: [cur.age.u20, cur.age.y20, cur.age.y30, cur.age.y40, cur.age.y50, cur.age.y60] },\n      pref: { labels: prefTop.map(p=>p[0]), values: prefTop.map(p=>p[1]) },\n      dow: { values: cur.coupon ? cur.coupon.byDow : [0,0,0,0,0,0,0] },\n      sales: salesSeries\n    };\n\n    return {\n      dataReady: true, dataNotReady: false,\n      selMonth, selMonthLabel: selMonth.replace('-','年')+'月',\n      selStore, selStoreLabel: storeObj.name,\n      monthOptions, storeOptions,\n      onMonthChange: this.onMonthChange, onStoreChange: this.onStoreChange,\n      kpi, rankRows, demo,\n      couponRanking, couponNameRows, couponNameEmpty: couponNameRows.length===0,\n      prefOrCityLabel,\n      showSalesReference: this.props.showSalesReference ?? true,\n      trendChartRef: this.trendChartRef, rankChartRef: this.rankChartRef,\n      genderChartRef: this.genderChartRef, ageChartRef: this.ageChartRef,\n      prefChartRef: this.prefChartRef, dowChartRef: this.dowChartRef, salesChartRef: this.salesChartRef,\n      accentColor: this.props.accentColor || '#1F8A5B'\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
